<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06080e">
<meta name="mobile-web-app-capable" content="yes">
<title>StudySync</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080e;--bg2:#0b0e16;--bg3:#111520;
  --s1:rgba(255,255,255,0.038);--s2:rgba(255,255,255,0.06);--s3:rgba(255,255,255,0.1);
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);
  --t1:#eef0f4;--t2:rgba(240,242,245,0.52);--t3:rgba(240,242,245,0.26);--t4:rgba(240,242,245,0.13);
  --r:#2dd4bf;--r2:rgba(45,212,191,0.07);--r3:rgba(45,212,191,0.18);
  --v:#e879a8;--v2:rgba(232,121,168,0.07);--v3:rgba(232,121,168,0.18);
  --accent:var(--r);--abg:var(--r2);--abr:var(--r3);
  --study:#2dd4bf;--anki:#a78bfa;--mcq:#fb923c;--health:#4ade80;
  --routine:#94a3b8;--brk:#facc15;--leisure:#f472b6;--work:#60a5fa;--sleep:#818cf8;
  --red:#f43f5e;--green:#22c55e;--gold:#eab308;
  --font:'Manrope',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --rad:16px;--rad-s:10px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --nav-h:60px
}
html{background:var(--bg)}
body{font-family:var(--font);color:var(--t1);background:var(--bg);max-width:520px;margin:0 auto;min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-top:var(--safe-t);padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ─ HEADER ─────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;padding:10px 16px 0;background:linear-gradient(180deg,rgba(6,8,14,0.98) 85%,transparent);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hdr-left .hdr-date{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:700}
.hdr-left .hdr-name{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:-0.8px;margin-top:1px;line-height:1}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-gear{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--s1);border:1px solid var(--b1);font-size:15px;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.hdr-gear:active{transform:scale(0.82) rotate(30deg)}
.hdr-clock{text-align:right}
.clock-time{font-family:var(--mono);font-size:19px;font-weight:600;color:var(--t1);letter-spacing:-1.5px;line-height:1}
.clock-sec{font-size:10px;color:var(--t4)}.clock-per{font-size:8px;color:var(--t3)}
.sync-dot{width:5px;height:5px;border-radius:3px;display:inline-block;margin-right:3px}
.sync-dot.on{background:var(--green);animation:pulse 2.5s infinite}
.sync-dot.off{background:var(--t4)}
.psw{display:flex;background:var(--s1);border-radius:13px;padding:3px;position:relative;overflow:hidden;margin-bottom:8px}
.psw-btn{flex:1;padding:9px 0;border-radius:10px;font-size:12.5px;font-weight:800;position:relative;z-index:2;text-align:center;transition:color 0.25s;letter-spacing:0.2px}
.psw-btn:active{transform:scale(0.94)}
.psw-bg{position:absolute;top:3px;height:calc(100% - 6px);width:calc(50% - 3px);border-radius:10px;transition:all 0.42s cubic-bezier(0.34,1.56,0.64,1);z-index:1}

/* ─ PROGRESS BAR — sticky inside header ─ */
.day-progress{height:2.5px;background:var(--s2);position:relative;overflow:visible;margin-bottom:0}
.day-progress-fill{height:100%;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);position:relative;border-radius:2px}
.day-progress-fill::after{content:'';position:absolute;right:-1px;top:-3.5px;width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent),0 0 4px var(--accent)}

/* ─ SUBJECT + D-DAY HERO ─ */
.hero{margin:10px 16px 8px;padding:0;display:flex;gap:8px}
.hero-subj{flex:1;padding:14px 16px;border-radius:16px;background:linear-gradient(135deg,var(--abg),rgba(0,0,0,0));border:1px solid var(--abr);position:relative;overflow:hidden}
.hero-subj::before{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,var(--accent),transparent 70%);opacity:0.08;pointer-events:none}
.hero-subj-lbl{font-size:7.5px;color:var(--t3);text-transform:uppercase;letter-spacing:2.5px;font-weight:700;margin-bottom:4px}
.hero-subj-name{font-size:17px;font-weight:900;color:var(--accent);letter-spacing:-0.3px;line-height:1.1}
.hero-subj-days{font-size:10px;color:var(--t3);margin-top:4px;font-weight:600}
.hero-subj-days span{color:var(--t2)}
.hero-dday{width:78px;flex-shrink:0;padding:14px 10px;border-radius:16px;background:linear-gradient(135deg,rgba(244,63,94,0.1),rgba(244,63,94,0.04));border:1px solid rgba(244,63,94,0.18);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-dday-num{font-family:var(--mono);font-size:28px;font-weight:700;color:#f43f5e;line-height:1}
.hero-dday-lbl{font-size:7px;color:rgba(244,63,94,0.6);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-top:4px}
.hero-dday-date{font-size:8px;color:rgba(244,63,94,0.4);margin-top:2px}

/* ─ NOW PLAYING ─ */
.now{margin:0 16px 8px;padding:14px 16px;border-radius:16px;background:var(--s1);border:1px solid transparent;position:relative;overflow:hidden;cursor:pointer;transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1)}
.now:active{transform:scale(0.975)}
.now-glow{position:absolute;top:-50px;right:-50px;width:140px;height:140px;border-radius:50%;filter:blur(50px);opacity:0.1;pointer-events:none}
.now::before{content:'';position:absolute;inset:0 0 auto 0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.3}
.now-top{display:flex;align-items:center;gap:11px}
.now-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
.now-info{flex:1;min-width:0}
.now-lbl{font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:700}
.now-name{font-size:14.5px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-timer{font-family:var(--mono);font-size:26px;font-weight:700;flex-shrink:0;letter-spacing:-2px;line-height:1}
.now-bar{height:2px;background:rgba(255,255,255,0.04);border-radius:2px;margin-top:12px;overflow:hidden}
.now-bar-fill{height:100%;border-radius:2px;transition:width 1s linear}

/* ─ PHASE + MINI-CONTEXT ─ */
.context-row{display:flex;align-items:center;gap:8px;padding:0 16px 8px}
.phase-pill{flex:1;display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:10px;background:var(--s1);border:1px solid var(--b1)}
.phase-dot{width:5px;height:5px;border-radius:3px;flex-shrink:0}
.phase-name{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;flex:1}
.phase-track{width:48px;height:3px;background:var(--s2);border-radius:2px;overflow:hidden}
.phase-fill{height:100%;border-radius:2px}
.phase-rem{font-size:8.5px;color:var(--t4);font-family:var(--mono);flex-shrink:0}
.gt-badge{padding:7px 11px;border-radius:10px;background:var(--s1);border:1px solid var(--b1);font-size:8.5px;font-weight:700;color:var(--t3);flex-shrink:0;display:flex;align-items:center;gap:5px;white-space:nowrap}

/* ─ QUOTE CARD ─ */
.quote-card{margin:2px 16px 10px;padding:12px 16px;border-radius:14px;background:var(--s1);border:1px solid var(--b1);position:relative;overflow:hidden;border-left:2.5px solid var(--accent)}
.quote-card::before{content:'"';position:absolute;right:8px;top:-4px;font-size:52px;line-height:1;font-family:Georgia,serif;color:var(--accent);opacity:0.07;pointer-events:none}
.quote-text{font-size:11px;color:var(--t2);font-style:italic;line-height:1.7;letter-spacing:0.1px}

/* ─ GROUP MOTIVATIONAL PUSH ─ */
.group-push{padding:6px 16px 3px;display:flex;align-items:center;gap:6px}
.group-push-text{font-size:9.5px;color:var(--t3);font-weight:600;line-height:1.4}

/* ─ TASK GROUP ─ */
.tg{font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:3px;color:var(--t4);padding:10px 16px 5px;display:flex;align-items:center;gap:10px}
.tg-done{font-family:var(--mono);font-size:8px;color:var(--t4);background:var(--s1);padding:2px 7px;border-radius:20px;margin-left:auto}
.tg::before{content:'';width:20px;height:1px;background:var(--b1);flex-shrink:0}

/* ─ TASKS ─ */
.tk{padding:10px 14px 10px 12px;border-bottom:1px solid rgba(255,255,255,0.022);border-left:2px solid transparent;transition:background 0.15s,border-color 0.15s}
.tk.act{background:linear-gradient(90deg,rgba(246,224,94,0.025),transparent);border-left-color:rgba(246,224,94,0.45)}
.tk.dn{opacity:0.38}
.tk-main{display:flex;align-items:flex-start;gap:10px}
.cb{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);position:relative}
.cb:active{transform:scale(0.78)!important}
.cb.on{animation:popCb 0.42s cubic-bezier(0.34,1.56,0.64,1)}
.cb .ck{font-size:9px;font-weight:900;opacity:0;transition:opacity 0.12s;color:var(--bg);position:absolute}
.cb.on .ck{opacity:1}
@keyframes popCb{0%{transform:scale(0.5)}40%{transform:scale(1.28)}65%{transform:scale(0.94)}100%{transform:scale(1)}}
.tk-c{flex:1;min-width:0}
.tk-r1{display:flex;align-items:center;gap:7px}
.tk-time{font-family:var(--mono);font-size:10px;color:var(--t4);min-width:56px;flex-shrink:0}
.tk.act .tk-time{color:#facc15}
.tk-nm{font-size:13.5px;font-weight:600;line-height:1.2;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk.dn .tk-nm{text-decoration:line-through;color:var(--t3)}
.tk-r2{display:flex;gap:5px;margin-top:4px;align-items:center}
.tk-cat{font-size:7px;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:0.3px}
.tk-dur{font-size:9.5px;color:var(--t4)}
.tk-ov{font-size:8px;color:var(--red);font-weight:700;animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.tk-exp{color:var(--t4);font-size:9px;padding:3px 4px;transition:transform 0.22s;flex-shrink:0}
.tk-exp.op{transform:rotate(180deg)}
.tk-det{max-height:0;overflow:hidden;transition:max-height 0.32s ease;padding-left:33px}
.tk-det.op{max-height:220px;padding:8px 0 4px 33px}
.tk-desc{font-size:11.5px;color:var(--t2);line-height:1.65}
.act-row{display:flex;align-items:center;gap:7px;margin-top:8px}
.act-lbl{font-size:10.5px;color:var(--t3)}
.act-inp{width:52px;padding:5px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);font-family:var(--mono);font-size:13px;text-align:center;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.act-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}

/* ─ STATS ─ */
.stat-tabs{display:flex;border-bottom:1px solid var(--b1);padding:0 16px}
.stat-tab{flex:1;padding:9px 0;text-align:center;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--t4);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
.stat-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 16px 14px}
.cat-card{padding:11px 10px;border-radius:14px;background:var(--s1);border:1px solid var(--b1);text-align:center;position:relative;overflow:hidden;transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.cat-card:active{transform:scale(0.93)}
.cat-card.done::after{content:'';position:absolute;inset:0;border-radius:14px;border:1px solid;border-color:inherit;opacity:0.4}
.cat-e{font-size:18px;display:block;margin-bottom:3px}
.cat-l{font-size:8.5px;color:var(--t2);font-weight:700;display:block}
.cat-pct{font-family:var(--mono);font-size:13px;font-weight:700;display:block;margin-top:3px}
.cat-bar{height:2px;border-radius:2px;background:var(--s2);margin-top:6px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px}
.bars-row{display:flex;gap:4px;height:66px;align-items:flex-end}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-val{font-family:var(--mono);font-size:8px;color:var(--t4)}
.bar-rect{width:100%;border-radius:3px 3px 2px 2px;position:relative;overflow:hidden}
.bar-rect::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent)}
.bar-day{font-size:7px;color:var(--t4);font-weight:700}

/* ─ HEATMAP ─ */
.hm-wrap{padding:14px;border-radius:var(--rad);background:var(--s1);border:1px solid var(--b1);margin-bottom:12px}
.hm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hm-title{font-size:9.5px;font-weight:800;color:var(--t2)}
.hm-legend{display:flex;align-items:center;gap:3px}
.hm-lc{width:9px;height:9px;border-radius:2px}
.hm-legend span{font-size:7.5px;color:var(--t4)}
.hm-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:3px;transition:transform 0.15s}
.hm-cell:active{transform:scale(0.85)}

/* ─ LEADERBOARD ─ */
.lb-vs{display:flex;align-items:stretch;gap:0;margin:0 16px 10px;border-radius:18px;overflow:hidden;border:1px solid var(--b1)}
.lb-card{flex:1;padding:16px 14px;background:var(--s1);text-align:center;position:relative;overflow:hidden;transition:background 0.3s}
.lb-card.win{background:linear-gradient(160deg,rgba(246,220,60,0.05),var(--s1))}
.lb-vs-sep{width:1px;background:var(--b1);flex-shrink:0;position:relative}
.lb-vs-sep::before{content:'VS';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:7.5px;font-weight:900;color:var(--t4);background:var(--bg2);padding:4px 2px;letter-spacing:1px;writing-mode:vertical-lr}
.lb-crown{position:absolute;top:6px;right:8px;font-size:13px;animation:crownBob 2.2s ease-in-out infinite}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-4px) rotate(5deg)}}
.lb-card-arc{display:block;margin:0 auto 6px}
.lb-card-name{font-size:12px;font-weight:800;margin-bottom:2px}
.lb-card-xp{font-family:var(--mono);font-size:10.5px;color:var(--gold);font-weight:600}
.lb-card-lvl{font-size:9px;color:var(--t3);margin-top:2px}
.lb-card-lvlbar{height:2px;border-radius:2px;background:var(--s2);margin-top:7px;overflow:hidden}
.lb-card-lvlbar-f{height:100%;border-radius:2px}
.spark{display:flex;gap:3px;justify-content:center;margin-top:7px}
.spark-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lb-comp{background:var(--s1);border-radius:var(--rad);padding:13px 14px;border:1px solid var(--b1);margin:0 16px 8px}
.lb-comp-title{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:10px}
.lb-dual{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.lb-dual:last-child{margin-bottom:0}
.lb-dual-lbl{font-size:10px;color:var(--t3);width:56px;flex-shrink:0}
.lb-dual-track{flex:1;height:5px;background:var(--s2);border-radius:4px;overflow:hidden;position:relative}
.lb-dual-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);position:relative}
.lb-dual-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2))}
.lb-dual-val{font-family:var(--mono);font-size:10px;font-weight:600;width:32px;text-align:right;flex-shrink:0}
.badge-row{display:flex;flex-wrap:wrap;gap:5px;padding:12px 16px 8px}
.badge-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;background:var(--s1);border:1px solid var(--b1);font-size:9px;font-weight:700;transition:transform 0.2s}
.badge-chip.glow{animation:badgeGlow 0.6s ease}
@keyframes badgeGlow{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.lb-mot{margin:0 16px 12px;padding:18px;border-radius:var(--rad);background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid var(--b1);text-align:center}

/* ─ LOVE NOTES ─ */
.love-view{padding:14px 16px}
.love-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.love-streak{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:20px;background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid rgba(255,255,255,0.08);font-size:10.5px;font-weight:700}
.love-prompts{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.love-prompts::-webkit-scrollbar{height:0}
.love-prompt-btn{flex-shrink:0;padding:7px 12px;border-radius:20px;font-size:11.5px;font-weight:600;background:var(--s1);border:1px solid var(--b1);color:var(--t2);transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap}
.love-prompt-btn:active{transform:scale(0.88)}
.love-compose{display:flex;gap:7px;margin-bottom:16px;align-items:flex-end}
.love-input{flex:1;padding:10px 13px;border-radius:14px;border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none;color:var(--t1);resize:none;min-height:42px;max-height:110px;line-height:1.5;font-family:var(--font);transition:border-color 0.2s,box-shadow 0.2s}
.love-input:focus{border-color:var(--v3);box-shadow:0 0 0 2px var(--v2)}
.love-send{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--r3),var(--v3));border:1px solid var(--b1);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.love-send:active{transform:scale(0.8)}
.date-sep{text-align:center;margin:10px 0 6px;font-size:8.5px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;display:flex;align-items:center;gap:8px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--b1)}
.msg-wrap{display:flex;margin-bottom:6px;gap:5px;position:relative}
.msg-wrap.right{flex-direction:row-reverse}
.msg-bubble{padding:10px 13px;border-radius:14px;max-width:82%;position:relative;transition:transform 0.15s}
.msg-bubble:active{transform:scale(0.97)}
.msg-text{font-size:12.5px;color:var(--t1);line-height:1.6}
.msg-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:8px}
.msg-from{font-size:8px;font-weight:700}
.msg-time{font-size:8px;color:var(--t4)}
.msg-edited{font-size:7px;color:var(--t4);font-style:italic}
.msg-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}

.pin-banner{margin-bottom:10px;padding:10px 12px;border-radius:12px;background:linear-gradient(135deg,rgba(234,179,8,0.07),rgba(234,179,8,0.02));border:1px solid rgba(234,179,8,0.15)}

.love-edit-box{background:var(--bg2);border-radius:14px;border:1px solid var(--b1);padding:12px;margin-bottom:12px}

/* ─ CALENDAR ─ */
.timeline-item{display:flex;gap:12px;padding:10px 0;position:relative}

.tl-content{flex:1;padding-top:6px}
.tl-date{font-size:8.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.tl-title{font-size:13px;font-weight:700;margin-top:1px}
.tl-sub{font-size:10.5px;color:var(--t3);margin-top:2px}
.tl-days-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600;margin-top:5px;display:inline-block}

/* ─ SETTINGS / EDIT MODALS ─ */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
.settings-overlay.open{opacity:1;pointer-events:all}
.settings-panel{position:fixed;top:0;right:-310px;bottom:0;width:290px;max-width:88vw;background:var(--bg2);z-index:201;overflow-y:auto;padding:18px 14px calc(18px + var(--safe-b));transition:right 0.35s cubic-bezier(0.4,0,0.2,1);border-left:1px solid var(--b1)}

.sp-title{font-size:14px;font-weight:900;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;letter-spacing:-0.3px}
.sp-close{font-size:17px;color:var(--t3);padding:4px 7px;border-radius:8px;background:var(--s1);transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.sp-close:active{transform:scale(0.82) rotate(90deg)}
.st-cd{background:var(--s1);border-radius:var(--rad);padding:13px;border:1px solid var(--b1);margin-bottom:8px}
.st-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.st-lbl{font-size:12.5px;font-weight:700}
.st-desc{font-size:10.5px;color:var(--t3);margin-top:4px;line-height:1.55}

/* ─ ENHANCED TOGGLE ─ */
.tgl{width:50px;height:27px;border-radius:27px;flex-shrink:0;position:relative;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);border:1.5px solid transparent;cursor:pointer}
.tgl.off{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1)}
.tgl.on{background:var(--abg);border-color:var(--accent);box-shadow:0 0 12px var(--accent)33}
.tgl-k{width:20px;height:20px;border-radius:50%;position:absolute;top:2px;transition:all 0.38s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.tgl.off .tgl-k{left:2px;background:#4a5568}
.tgl.on .tgl-k{left:26px;background:var(--accent);box-shadow:0 2px 10px var(--accent)66,0 0 4px var(--accent)44}
.tgl:active .tgl-k{width:24px}

.dbtn{padding:9px 16px;border-radius:var(--rad-s);font-size:11.5px;font-weight:700;border:1px solid rgba(244,63,94,0.18);background:rgba(244,63,94,0.06);color:var(--red);transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.dbtn:active{transform:scale(0.9)}
.fb-input{width:100%;padding:9px 11px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--bg);font-family:var(--mono);font-size:10px;outline:none;resize:vertical;min-height:65px;color:var(--t1)}
.fb-input:focus{border-color:var(--accent)}
.fb-btn,.cal-btn{padding:10px 0;border-radius:var(--rad-s);font-size:12px;font-weight:700;background:var(--abg);color:var(--accent);border:1px solid var(--abr);width:100%;margin-top:7px;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1)}
.fb-btn:active,.cal-btn:active{transform:scale(0.95)}

/* ─ SCHEDULE EDIT MODAL ─ */
.smod{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;transition:opacity 0.3s;opacity:0;pointer-events:none}
.smod.open{opacity:1;pointer-events:all}
.smod-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--bg);z-index:10}
.smod-title{font-size:16px;font-weight:900;letter-spacing:-0.4px}
.smod-close{font-size:18px;color:var(--t3);padding:5px 8px;border-radius:9px;background:var(--s1);transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.smod-close:active{transform:scale(0.82) rotate(90deg)}
.smod-tabs{display:flex;gap:5px;padding:10px 16px;border-bottom:1px solid var(--b1)}
.smod-tab{flex:1;padding:8px 0;border-radius:10px;font-size:11px;font-weight:800;text-align:center;background:var(--s1);border:1px solid var(--b1);color:var(--t3);transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1)}
.smod-tab.on{background:var(--abg);border-color:var(--abr);color:var(--accent)}
.smod-tab:active{transform:scale(0.92)}
.smod-body{flex:1;overflow-y:auto;padding:8px 16px calc(8px + var(--safe-b))}
.smod-block{padding:12px;border-radius:12px;background:var(--s1);border:1px solid var(--b1);margin-bottom:7px;transition:opacity 0.2s}
.smod-block.deleted-block{opacity:0.45;border-style:dashed}
.smod-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.smod-block-name{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.smod-block-cat{font-size:8px;padding:2px 7px;border-radius:20px;font-weight:700;flex-shrink:0}
.smod-fields{display:flex;gap:6px}
.smod-field{flex:1}
.smod-field-lbl{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:3px}
.smod-inp{width:100%;padding:7px 9px;border-radius:8px;border:1px solid var(--b1);background:var(--bg2);font-size:12.5px;outline:none;color:var(--t1);font-family:var(--mono);transition:border-color 0.2s,box-shadow 0.2s}

.smod-btns{display:flex;gap:5px;margin-top:8px}
.smod-save-btn{flex:2;padding:11px;border-radius:10px;font-size:13px;font-weight:700;background:var(--accent);color:var(--bg);border:none;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1)}
.smod-save-btn:active{transform:scale(0.94)}
.smod-reset-btn{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;background:rgba(255,255,255,0.04);border:1px solid var(--b1);color:var(--t3);transition:all 0.2s}
.smod-reset-btn:active{transform:scale(0.94)}
.smod-del-btn{width:36px;padding:9px 0;border-radius:10px;font-size:13px;background:rgba(244,63,94,0.07);border:1px solid rgba(244,63,94,0.15);color:#f43f5e;flex-shrink:0;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1)}
.smod-del-btn:active{transform:scale(0.84)}
.smod-restore-btn{width:100%;padding:9px;border-radius:10px;font-size:11.5px;font-weight:700;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.15);color:#4ade80;transition:all 0.2s}
.smod-restore-btn:active{transform:scale(0.94)}
.smod-deleted-section{margin-top:16px;padding-top:14px;border-top:1px solid var(--b1)}
.smod-deleted-title{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.smod-deleted-title::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ─ TASK EDIT / FOCUS ─ */
.emod{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:998;display:flex;align-items:flex-end;justify-content:center}
.emod-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;padding:18px 16px calc(18px + var(--safe-b))}
.emod-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.emod-close{font-size:18px;color:var(--t3);padding:4px 7px;transition:transform 0.2s}
.emod-close:active{transform:scale(0.8) rotate(90deg)}
.emod-field{margin-bottom:11px}
.emod-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:3px}
.emod-inp{width:100%;padding:10px 13px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:13.5px;outline:none;color:var(--t1);transition:border-color 0.2s,box-shadow 0.2s}
.emod-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.emod-save{width:100%;padding:13px;border-radius:var(--rad-s);font-size:14px;font-weight:800;background:var(--accent);color:var(--bg);border:none;margin-top:8px;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1)}
.emod-save:active{transform:scale(0.95)}
.focus{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity 0.3s;opacity:0;pointer-events:none}
.focus.vis{opacity:1;pointer-events:all}
.f-lbl{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:12px}
.f-nm{font-size:21px;font-weight:900;text-align:center;margin-bottom:5px;letter-spacing:-0.3px}
.f-desc{font-size:11.5px;color:var(--t2);text-align:center;max-width:270px;line-height:1.65;margin-bottom:32px}
.f-timer{font-family:var(--mono);font-size:68px;font-weight:700;letter-spacing:-3px}
.f-sub{font-size:11px;color:var(--t4);margin-top:4px;margin-bottom:32px}
.f-bar{width:200px;height:2px;background:var(--s1);border-radius:2px;margin-bottom:36px;overflow:hidden}
.f-bar-f{height:100%;border-radius:2px;transition:width 1s linear}
.f-exit{padding:13px 34px;border-radius:13px;background:var(--s1);border:1px solid var(--b1);font-size:14px;font-weight:700;color:var(--t2);transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1)}
.f-exit:active{transform:scale(0.92)}

/* ─ MISC ─ */
.cal-inp{width:100%;padding:10px 13px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none;color:var(--t1);transition:border-color 0.2s,box-shadow 0.2s}
.cal-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.cal-inp::placeholder{color:var(--t4)}
.note-area{width:100%;padding:10px 13px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none;color:var(--t1);resize:vertical;min-height:58px;line-height:1.6;font-family:var(--font);transition:border-color 0.2s,box-shadow 0.2s}
.note-area:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.sub-t{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:var(--t3);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.sub-t::after{content:'';flex:1;height:1px;background:var(--b1)}
.sec-pad{padding:0 16px}
.day-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:8px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase}
.xp-toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-18px);padding:7px 16px;border-radius:28px;font-family:var(--mono);font-size:12px;font-weight:700;z-index:500;opacity:0;pointer-events:none;transition:all 0.38s cubic-bezier(0.34,1.56,0.64,1);background:rgba(234,179,8,0.12);border:1px solid rgba(234,179,8,0.22);color:var(--gold);backdrop-filter:blur(20px)}
.xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:100;display:flex;align-items:stretch;padding:5px 8px calc(5px + var(--safe-b));background:rgba(6,8,14,0.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--b1)}
.nav-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px;border-radius:11px;font-size:7.5px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.nav-b .nav-i{font-size:17px;line-height:1;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.nav-b.on{color:var(--accent);background:var(--abg)}
.nav-b.on .nav-i{transform:scale(1.18) translateY(-2px)}
.nav-b:not(.on){color:var(--t4)}
.nav-b:active .nav-i{transform:scale(0.84)}

/* ─ ENERGY BUTTONS — redesigned ─ */
.energy-seg{flex:1;height:38px;border-radius:9px;font-size:10px;font-weight:700;transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);border:1.5px solid transparent;background:var(--s1);color:var(--t4);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}
.energy-seg:active{transform:scale(0.88) translateY(1px)}
.energy-seg.on{color:var(--bg)}
.energy-seg span.esn{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8}

/* ─ BRAIN STATE BUTTONS ─ */
.brain-btn{padding:10px 14px;border-radius:12px;font-size:12px;font-weight:700;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);background:var(--s1);border:1.5px solid var(--b1);color:var(--t2);display:flex;align-items:center;gap:6px}
.brain-btn:active{transform:scale(0.88)}
.brain-btn .bs-em{font-size:16px}
.brain-btn .bs-lbl{font-size:11px;font-weight:700}

/* ─ GT CHART ─ */
.gt-chart-wrap{background:var(--bg3);border-radius:10px;padding:10px;margin-top:12px;border:1px solid var(--b1)}
.gt-chart-legend{display:flex;gap:12px;margin-top:6px;justify-content:center}
.gt-chart-legend span{font-size:8.5px;color:var(--t4);display:flex;align-items:center;gap:4px}
.gt-chart-legend span::before{content:'';width:8px;height:8px;border-radius:2px;display:inline-block}

/* ─ WINS INPUT ─ */
.wins-area{width:100%;padding:12px 13px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:12.5px;outline:none;color:var(--t1);resize:none;min-height:70px;line-height:1.7;font-family:var(--font);transition:border-color 0.2s,box-shadow 0.2s}
.wins-area:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(74,222,128,0.1)}
.wins-area::placeholder{color:var(--t4)}

.anim{animation:fadeUp 0.3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

window.tg=function(id){if(!S.data[S.p])S.data[S.p]={};if(!S.data[S.p][id])S.data[S.p][id]={};var was=S.data[S.p][id].done;S.data[S.p][id].done=!was;if(!was){var sc2=sched(),cat="routine";for(var i=0;i<sc2.length;i++){if(sc2[i].id===id){cat=sc2[i].cat;break}}showXP(XP_MAP[cat]||3,cat)}saveHistory();save();render()};
window.sa=function(id,val){if(!S.data[S.p])S.data[S.p]={};if(!S.data[S.p][id])S.data[S.p][id]={};S.data[S.p][id].actualMin=parseInt(val)||0;save()};
window.te=function(id){expanded[id]=!expanded[id];render()};
window.tta=function(){S.ta=!S.ta;save();render()};
window.tse=function(){S.showEditor=!S.showEditor;save();render()};
window.scal=function(){var inp=document.getElementById("calinp");if(inp)S.cal=inp.value.trim();save();render()};
window.sfb=function(){var inp=document.getElementById("fbinp");if(inp){S.fbCfg=inp.value.trim();save();if(typeof firebase==="undefined")alert("Firebase loading...");else fbInit()}};
window.rp=function(w){if(confirm("Reset "+(w==="both"?"both":w)+"?")){if(w==="both")S.data={rutik:{},vaishnavi:{}};else S.data[w]={};save();render()}};
window.ofoc=function(id){S.foc=id;render()};window.cfoc=function(){S.foc=null;render()};
window.openEdit=function(id){S.editModal=id;render()};window.closeEdit=function(){S.editModal=null;render()};
window.saveEdit=function(id){var nm2=document.getElementById("ed-name").value.trim(),tm=document.getElementById("ed-time").value.trim(),dr=parseInt(document.getElementById("ed-dur").value),ds=document.getElementById("ed-desc").value.trim();if(!S.edits[S.p])S.edits[S.p]={};S.edits[S.p][id]={block:nm2,time:tm,dur:isNaN(dr)?0:dr,desc:ds};S.editModal=null;save();render()};
window.resetEdit=function(id){if(S.edits[S.p]&&S.edits[S.p][id])delete S.edits[S.p][id];S.editModal=null;save();render()};
window.saveNote=function(val){S.notes[TODAY+"_"+S.p]=val;save()};
window.sendLove=function(){var inp=document.getElementById("loveinp");if(!inp||!inp.value.trim())return;_sendLoveMsg(inp.value.trim());inp.value=""};
window.quickSendLove=function(idx){_sendLoveMsg(LOVE_PROMPTS[idx].text)};
function _sendLoveMsg(txt){if(!S.loveNotes)S.loveNotes=[];var n2=new Date(),ts=n2.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+n2.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});S.loveNotes.push({from:S.p,text:txt,time:ts,ts:Date.now(),reactions:{},pinned:false});if(S.loveNotes.length>60)S.loveNotes=S.loveNotes.slice(-60);save();render()}
window.deleteLove=function(idx){if(confirm("Delete?")){S.loveNotes.splice(idx,1);if(S.loveEditIdx===idx)S.loveEditIdx=null;if(S.loveReactIdx===idx)S.loveReactIdx=null;save();render()}};
window.editLoveNote=function(idx){S.loveEditIdx=idx;S.loveReactIdx=null;render()};
window.saveLoveEdit=function(){var inp=document.getElementById("love-edit-ta");if(!inp)return;var txt=inp.value.trim();if(txt&&S.loveEditIdx!==null&&S.loveNotes[S.loveEditIdx]){S.loveNotes[S.loveEditIdx].text=txt;S.loveNotes[S.loveEditIdx].edited=true}S.loveEditIdx=null;save();render()};
window.cancelLoveEdit=function(){S.loveEditIdx=null;render()};
window.togglePin=function(idx){if(S.loveNotes[idx]){S.loveNotes[idx].pinned=!S.loveNotes[idx].pinned;save();render()}};
window.toggleReactPicker=function(idx){S.loveReactIdx=(S.loveReactIdx===idx?null:idx);render()};
window.addReaction=function(idx,emoji){if(!S.loveNotes[idx])return;if(!S.loveNotes[idx].reactions)S.loveNotes[idx].reactions={};if(!S.loveNotes[idx].reactions[emoji])S.loveNotes[idx].reactions[emoji]=[];var arr=S.loveNotes[idx].reactions[emoji],pos=arr.indexOf(S.p);if(pos>=0)arr.splice(pos,1);else arr.push(S.p);S.loveReactIdx=null;save();render()};
window.setEnergy=function(val){S.tracker.energy[TODAY+"_"+S.p]=val;save();render()};
window.setBrain=function(state){var k=TODAY+"_"+S.p;if(!S.tracker.brain[k])S.tracker.brain[k]={};S.tracker.brain[k].state=state;save();render()};
window.setBrainTopic=function(val){var k=TODAY+"_"+S.p;if(!S.tracker.brain[k])S.tracker.brain[k]={};S.tracker.brain[k].topic=val;save()};
window.setWins=function(val){S.tracker.energy[TODAY+"_"+S.p+"_wins"]=val;save()};
window.logGT=function(){var d2=document.getElementById("gt-date"),a=document.getElementById("gt-actual"),p=document.getElementById("gt-pred");if(!d2||!a||!p)return;var dv=d2.value,av=parseInt(a.value),pv=parseInt(p.value);if(!dv||isNaN(av)||isNaN(pv)){alert("Fill all fields");return}if(!S.tracker.gt)S.tracker.gt=[];S.tracker.gt.push({date:dv,who:S.p,actual:av,predicted:pv});save();render()};
window.toggleSettings=function(){S.settingsOpen=!S.settingsOpen;render()};
window.openSchedModal=function(who){S.schedModal={open:true,mode:"weekday",who:who};S.settingsOpen=false;render()};
window.closeSchedModal=function(){S.schedModal={open:false,mode:"weekday",who:S.p};render()};
window.setSchedMode=function(mode){S.schedModal.mode=mode;render()};
window.saveSchedEdit=function(taskId){var sm=S.schedModal,smWho=sm.who,smMode=sm.mode;var tInp=document.getElementById("sm_t_"+taskId),dInp=document.getElementById("sm_d_"+taskId);if(!tInp||!dInp)return;var newT=tInp.value.trim(),newD=parseInt(dInp.value);var store=smMode==="gt"?S.gtEdits:(smMode==="weekend"?S.wkndEdits:S.edits);if(!store[smWho])store[smWho]={};store[smWho][taskId]={time:newT,dur:isNaN(newD)?undefined:newD};save();var btn=tInp.closest(".smod-block").querySelector(".smod-save-btn");if(btn){btn.textContent="Saved ✓";btn.style.background="#22c55e";setTimeout(function(){btn.textContent="Save";btn.style.background="var(--accent)"},1200)}};
window.resetSchedEdit=function(taskId){var sm=S.schedModal,smWho=sm.who,smMode=sm.mode;var store=smMode==="gt"?S.gtEdits:(smMode==="weekend"?S.wkndEdits:S.edits);if(store[smWho]&&store[smWho][taskId])delete store[smWho][taskId];save();render()};
window.deleteSchedSlot=function(taskId){var sm=S.schedModal,smWho=sm.who,smMode=sm.mode;if(!S.deletedSlots)S.deletedSlots={rutik:{weekday:[],weekend:[],gt:[]},vaishnavi:{weekday:[],weekend:[],gt:[]}};if(!S.deletedSlots[smWho])S.deletedSlots[smWho]={weekday:[],weekend:[],gt:[]};if(!S.deletedSlots[smWho][smMode])S.deletedSlots[smWho][smMode]=[];if(S.deletedSlots[smWho][smMode].indexOf(taskId)<0)S.deletedSlots[smWho][smMode].push(taskId);save();render()};
window.restoreSchedSlot=function(taskId){var sm=S.schedModal,smWho=sm.who,smMode=sm.mode;if(!S.deletedSlots||!S.deletedSlots[smWho]||!S.deletedSlots[smWho][smMode])return;S.deletedSlots[smWho][smMode]=S.deletedSlots[smWho][smMode].filter(function(id){return id!==taskId});save();render()};

// ── TICK ──────────────────────────────────────────────────────────────────────
function tick(){var el=document.getElementById("clk");if(el){var c=gc();el.innerHTML=c.h+":"+c.m+'<span class="clock-sec">:'+c.s+'</span> <span class="clock-per">'+c.p+'</span>'}var cd=document.getElementById("cd");if(cd){var sc2=sched(),d2=pd(),at2=S.ta?adjT(sc2,d2):null,act2=actTask(sc2,at2);if(act2){var ar3=actRem(act2,at2);cd.textContent=ar3.rem>0?fm(ar3.rem):"Done"}}var ft2=document.getElementById("ftimer");if(ft2&&S.foc){var sc3=sched(),d3=pd(),at3=S.ta?adjT(sc3,d3):null,ft3=null;for(var i=0;i<sc3.length;i++){if(sc3[i].id===S.foc)ft3=sc3[i]}if(ft3){var ar4=actRem(ft3,at3);ft2.textContent=ar4.rem>0?fm(ar4.rem):"Done!"}}}
setInterval(tick,1000);setInterval(function(){if(!S.foc&&!S.editModal&&!S.schedModal.open)render()},60000);

render();
