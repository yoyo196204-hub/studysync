<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050709">
<meta name="mobile-web-app-capable" content="yes">
<title>StudySync</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050709;--bg2:#0a0c12;--bg3:#0f1219;--bg4:#141822;
  --s1:rgba(255,255,255,0.035);--s2:rgba(255,255,255,0.055);--s3:rgba(255,255,255,0.09);
  --b1:rgba(255,255,255,0.055);--b2:rgba(255,255,255,0.1);
  --t1:#f0f2f5;--t2:rgba(240,242,245,0.55);--t3:rgba(240,242,245,0.3);--t4:rgba(240,242,245,0.14);
  --r:#34d8c0;--r2:rgba(52,216,192,0.06);--r3:rgba(52,216,192,0.16);--r-glow:rgba(52,216,192,0.25);
  --v:#e87aab;--v2:rgba(232,122,171,0.06);--v3:rgba(232,122,171,0.16);--v-glow:rgba(232,122,171,0.25);
  --accent:var(--r);--abg:var(--r2);--abr:var(--r3);--a-glow:var(--r-glow);
  --study:#34d8c0;--anki:#a78bfa;--mcq:#fb923c;--health:#4ade80;
  --routine:#94a3b8;--brk:#facc15;--leisure:#f472b6;--work:#60a5fa;--sleep:#818cf8;
  --red:#f43f5e;--green:#22c55e;--gold:#eab308;
  --font:'Plus Jakarta Sans','Manrope',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --rad:14px;--rad-s:10px;--rad-xs:8px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --nav-h:58px;
  --ease:cubic-bezier(0.34,1.56,0.64,1);--ease-out:cubic-bezier(0.16,1,0.3,1)
}
html{background:var(--bg)}
body{font-family:var(--font);color:var(--t1);background:var(--bg);max-width:520px;margin:0 auto;min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-top:var(--safe-t);padding-bottom:calc(var(--nav-h) + var(--safe-b) + 10px)}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:0;height:0}
::selection{background:var(--accent);color:var(--bg)}

/* ─ HEADER ─ */
.hdr{position:sticky;top:0;z-index:100;padding:10px 16px 0;background:linear-gradient(180deg,rgba(5,7,9,0.97) 80%,transparent);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hdr-left .hdr-date{font-size:8.5px;color:var(--t4);text-transform:uppercase;letter-spacing:2.5px;font-weight:700}
.hdr-left .hdr-name{font-size:21px;font-weight:900;color:var(--accent);letter-spacing:-0.8px;margin-top:2px;line-height:1;display:flex;align-items:center;gap:6px}
.hdr-left .hdr-name .personality-tag{font-size:7px;padding:2px 6px;border-radius:20px;background:var(--abg);border:1px solid var(--abr);font-weight:700;letter-spacing:1px;text-transform:uppercase;vertical-align:middle;color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-btn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--s1);border:1px solid var(--b1);font-size:14px;transition:all 0.25s var(--ease)}
.hdr-btn:active{transform:scale(0.82)}
.hdr-btn.notif-on{background:rgba(234,179,8,0.08);border-color:rgba(234,179,8,0.18)}
.hdr-clock{text-align:right}
.clock-time{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--t1);letter-spacing:-1.5px;line-height:1}
.clock-sec{font-size:9px;color:var(--t4)}.clock-per{font-size:7.5px;color:var(--t3)}
.sync-ind{display:flex;align-items:center;gap:3px;justify-content:flex-end;margin-top:3px}
.sync-dot{width:4px;height:4px;border-radius:3px}
.sync-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2.5s infinite}
.sync-dot.off{background:var(--t4)}
.psw{display:flex;background:var(--s1);border-radius:11px;padding:2.5px;position:relative;overflow:hidden;margin-bottom:8px}
.psw-btn{flex:1;padding:8px 0;border-radius:9px;font-size:12px;font-weight:800;position:relative;z-index:2;text-align:center;transition:color 0.25s;letter-spacing:0.3px}
.psw-btn:active{transform:scale(0.94)}
.psw-bg{position:absolute;top:2.5px;height:calc(100% - 5px);width:calc(50% - 2.5px);border-radius:9px;transition:all 0.42s var(--ease);z-index:1}
.day-progress{height:2px;background:var(--s1);position:relative;overflow:visible;margin-bottom:0}
.day-progress-fill{height:100%;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);position:relative;border-radius:2px}
.day-progress-fill::after{content:'';position:absolute;right:-1px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent),0 0 3px var(--accent)}

/* ─ HERO ─ */
.hero{margin:10px 16px 8px;display:flex;gap:8px}
.hero-subj{flex:1;padding:13px 15px;border-radius:var(--rad);background:linear-gradient(135deg,var(--abg),transparent);border:1px solid var(--abr);position:relative;overflow:hidden}
.hero-subj::before{content:'';position:absolute;right:-15px;top:-15px;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,var(--accent),transparent 70%);opacity:0.06;pointer-events:none}
.hero-subj-lbl{font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:2.5px;font-weight:700;margin-bottom:4px}
.hero-subj-name{font-size:16px;font-weight:900;color:var(--accent);letter-spacing:-0.3px;line-height:1.1}
.hero-subj-days{font-size:9.5px;color:var(--t3);margin-top:5px;font-weight:600}
.hero-subj-days span{color:var(--t2)}
.hero-dday{width:74px;flex-shrink:0;padding:13px 10px;border-radius:var(--rad);background:linear-gradient(135deg,rgba(244,63,94,0.08),rgba(244,63,94,0.02));border:1px solid rgba(244,63,94,0.14);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-dday-num{font-family:var(--mono);font-size:26px;font-weight:700;color:#f43f5e;line-height:1}
.hero-dday-lbl{font-size:6.5px;color:rgba(244,63,94,0.5);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-top:3px}
.hero-dday-date{font-size:7.5px;color:rgba(244,63,94,0.35);margin-top:2px}

/* ─ NOW PLAYING ─ */
.now{margin:0 16px 8px;padding:13px 15px;border-radius:var(--rad);background:var(--s1);border:1px solid transparent;position:relative;overflow:hidden;cursor:pointer;transition:transform 0.15s var(--ease)}
.now:active{transform:scale(0.975)}
.now-glow{position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;filter:blur(45px);opacity:0.08;pointer-events:none}
.now::before{content:'';position:absolute;inset:0 0 auto 0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.25}
.now-top{display:flex;align-items:center;gap:10px}
.now-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.now-info{flex:1;min-width:0}
.now-lbl{font-size:6.5px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:700}
.now-name{font-size:14px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-timer{font-family:var(--mono);font-size:24px;font-weight:700;flex-shrink:0;letter-spacing:-2px;line-height:1}
.now-bar{height:2px;background:rgba(255,255,255,0.03);border-radius:2px;margin-top:10px;overflow:hidden}
.now-bar-fill{height:100%;border-radius:2px;transition:width 1s linear}

/* ─ CONTEXT ROW ─ */
.context-row{display:flex;align-items:center;gap:6px;padding:0 16px 8px}
.phase-pill{flex:1;display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--rad-xs);background:var(--s1);border:1px solid var(--b1)}
.phase-dot{width:4px;height:4px;border-radius:3px;flex-shrink:0}
.phase-name{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;flex:1}
.phase-track{width:44px;height:2.5px;background:var(--s2);border-radius:2px;overflow:hidden}
.phase-fill{height:100%;border-radius:2px}
.phase-rem{font-size:8px;color:var(--t4);font-family:var(--mono);flex-shrink:0}
.gt-badge{padding:6px 10px;border-radius:var(--rad-xs);background:var(--s1);border:1px solid var(--b1);font-size:8px;font-weight:700;color:var(--t3);flex-shrink:0;display:flex;align-items:center;gap:4px;white-space:nowrap}

/* ─ PERSONALITY GREETING ─ */
.greeting-card{margin:2px 16px 8px;padding:11px 14px;border-radius:12px;background:var(--s1);border:1px solid var(--b1);position:relative;overflow:hidden;border-left:2px solid var(--accent)}
.greeting-text{font-size:11px;color:var(--t2);line-height:1.65;letter-spacing:0.1px}
.greeting-tag{font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-top:4px}

/* ─ GROUP + TASKS ─ */
.group-push{padding:4px 16px 2px;display:flex;align-items:center;gap:5px}
.group-push-text{font-size:9px;color:var(--t3);font-weight:600;line-height:1.4}
.tg{font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:3px;color:var(--t4);padding:8px 16px 4px;display:flex;align-items:center;gap:10px}
.tg-done{font-family:var(--mono);font-size:7.5px;color:var(--t4);background:var(--s1);padding:2px 7px;border-radius:20px;margin-left:auto}
.tg::before{content:'';width:16px;height:1px;background:var(--b1);flex-shrink:0}
.tk{padding:10px 14px 10px 12px;border-bottom:1px solid rgba(255,255,255,0.018);border-left:2px solid transparent;transition:all 0.15s}
.tk.act{background:linear-gradient(90deg,rgba(246,224,94,0.02),transparent);border-left-color:rgba(246,224,94,0.4)}
.tk.dn{opacity:0.32}
.tk-main{display:flex;align-items:flex-start;gap:9px}
.cb{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.28s var(--ease);position:relative}
.cb:active{transform:scale(0.75)!important}
.cb.on{animation:popCb 0.42s var(--ease)}
.cb .ck{font-size:8px;font-weight:900;opacity:0;transition:opacity 0.12s;color:var(--bg);position:absolute}
.cb.on .ck{opacity:1}
@keyframes popCb{0%{transform:scale(0.5)}40%{transform:scale(1.28)}65%{transform:scale(0.94)}100%{transform:scale(1)}}
.tk-c{flex:1;min-width:0}
.tk-r1{display:flex;align-items:center;gap:6px}
.tk-time{font-family:var(--mono);font-size:9.5px;color:var(--t4);min-width:54px;flex-shrink:0}
.tk.act .tk-time{color:#facc15}
.tk-nm{font-size:13px;font-weight:600;line-height:1.2;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk.dn .tk-nm{text-decoration:line-through;color:var(--t3)}
.tk-r2{display:flex;gap:4px;margin-top:3px;align-items:center}
.tk-cat{font-size:6.5px;padding:2px 6px;border-radius:20px;font-weight:700;letter-spacing:0.3px}
.tk-dur{font-size:9px;color:var(--t4)}
.tk-ov{font-size:7.5px;color:var(--red);font-weight:700;animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.tk-exp{color:var(--t4);font-size:8px;padding:3px 4px;transition:transform 0.22s;flex-shrink:0}
.tk-exp.op{transform:rotate(180deg)}
.tk-det{max-height:0;overflow:hidden;transition:max-height 0.32s ease;padding-left:31px}
.tk-det.op{max-height:260px;padding:8px 0 4px 31px}
.tk-desc{font-size:11px;color:var(--t2);line-height:1.65}
.act-row{display:flex;align-items:center;gap:6px;margin-top:7px}
.act-lbl{font-size:10px;color:var(--t3)}
.act-inp{width:50px;padding:5px;border-radius:var(--rad-xs);border:1px solid var(--b1);background:var(--s1);font-family:var(--mono);font-size:12px;text-align:center;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.act-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.tk-edit-btn{margin-top:7px;font-size:10.5px;color:var(--accent);font-weight:700;padding:4px 0;opacity:0.7;transition:opacity 0.2s}
.tk-edit-btn:active{opacity:1}

/* ─ NOTIFICATION TASK REMINDER ─ */
.notif-remind{margin-top:6px;display:flex;gap:4px}
.notif-remind-btn{font-size:8px;padding:3px 8px;border-radius:20px;background:var(--s1);border:1px solid var(--b1);color:var(--t3);font-weight:700;transition:all 0.2s var(--ease)}
.notif-remind-btn:active{transform:scale(0.9)}
.notif-remind-btn.set{background:rgba(234,179,8,0.08);border-color:rgba(234,179,8,0.18);color:var(--gold)}

/* ─ STATS ─ */
.stat-tabs{display:flex;border-bottom:1px solid var(--b1);padding:0 16px}
.stat-tab{flex:1;padding:8px 0;text-align:center;font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--t4);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
.stat-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 12px}
.cat-card{padding:10px 9px;border-radius:12px;background:var(--s1);border:1px solid var(--b1);text-align:center;position:relative;overflow:hidden;transition:transform 0.18s var(--ease)}
.cat-card:active{transform:scale(0.93)}
.cat-card.done::after{content:'';position:absolute;inset:0;border-radius:12px;border:1px solid;border-color:inherit;opacity:0.3}
.cat-e{font-size:16px;display:block;margin-bottom:2px}
.cat-l{font-size:8px;color:var(--t2);font-weight:700;display:block}
.cat-pct{font-family:var(--mono);font-size:12px;font-weight:700;display:block;margin-top:3px}
.cat-bar{height:2px;border-radius:2px;background:var(--s2);margin-top:5px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px}
.bars-row{display:flex;gap:3px;height:60px;align-items:flex-end}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-val{font-family:var(--mono);font-size:7.5px;color:var(--t4)}
.bar-rect{width:100%;border-radius:3px 3px 2px 2px;position:relative;overflow:hidden}
.bar-rect::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent)}
.bar-day{font-size:6.5px;color:var(--t4);font-weight:700}

/* ─ HEATMAP ─ */
.hm-wrap{padding:12px;border-radius:var(--rad);background:var(--s1);border:1px solid var(--b1);margin-bottom:10px}
.hm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.hm-title{font-size:9px;font-weight:800;color:var(--t2)}
.hm-legend{display:flex;align-items:center;gap:2.5px}
.hm-lc{width:8px;height:8px;border-radius:2px}
.hm-legend span{font-size:7px;color:var(--t4)}
.hm-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2.5px}
.hm-cell{aspect-ratio:1;border-radius:2.5px;transition:transform 0.15s}
.hm-cell:active{transform:scale(0.85)}

/* ─ LEADERBOARD ─ */
.lb-vs{display:flex;align-items:stretch;gap:0;margin:0 16px 10px;border-radius:16px;overflow:hidden;border:1px solid var(--b1)}
.lb-card{flex:1;padding:14px 12px;background:var(--s1);text-align:center;position:relative;overflow:hidden;transition:background 0.3s}
.lb-card.win{background:linear-gradient(160deg,rgba(246,220,60,0.04),var(--s1))}
.lb-vs-sep{width:1px;background:var(--b1);flex-shrink:0;position:relative}
.lb-vs-sep::before{content:'VS';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:7px;font-weight:900;color:var(--t4);background:var(--bg2);padding:4px 2px;letter-spacing:1px;writing-mode:vertical-lr}
.lb-crown{position:absolute;top:5px;right:7px;font-size:12px;animation:crownBob 2.2s ease-in-out infinite}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-3px) rotate(5deg)}}
.lb-card-arc{display:block;margin:0 auto 5px}
.lb-card-name{font-size:11.5px;font-weight:800;margin-bottom:2px}
.lb-card-xp{font-family:var(--mono);font-size:10px;color:var(--gold);font-weight:600}
.lb-card-lvl{font-size:8.5px;color:var(--t3);margin-top:2px}
.lb-card-lvlbar{height:2px;border-radius:2px;background:var(--s2);margin-top:6px;overflow:hidden}
.lb-card-lvlbar-f{height:100%;border-radius:2px}
.spark{display:flex;gap:2.5px;justify-content:center;margin-top:6px}
.spark-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lb-comp{background:var(--s1);border-radius:var(--rad);padding:12px;border:1px solid var(--b1);margin:0 16px 8px}
.lb-comp-title{font-size:7.5px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:9px}
.lb-dual{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.lb-dual:last-child{margin-bottom:0}
.lb-dual-lbl{font-size:9.5px;color:var(--t3);width:50px;flex-shrink:0}
.lb-dual-track{flex:1;height:4px;background:var(--s2);border-radius:4px;overflow:hidden;position:relative}
.lb-dual-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);position:relative}
.lb-dual-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15))}
.lb-dual-val{font-family:var(--mono);font-size:9.5px;font-weight:600;width:30px;text-align:right;flex-shrink:0}
.badge-row{display:flex;flex-wrap:wrap;gap:4px;padding:10px 16px 8px}
.badge-chip{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;background:var(--s1);border:1px solid var(--b1);font-size:8.5px;font-weight:700;transition:transform 0.2s}
.badge-chip.glow{animation:badgeGlow 0.6s ease}
@keyframes badgeGlow{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.lb-mot{margin:0 16px 12px;padding:16px;border-radius:var(--rad);background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid var(--b1);text-align:center}

/* ─ LOVE NOTES ─ */
.love-view{padding:12px 16px}
.love-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.love-streak{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid rgba(255,255,255,0.06);font-size:10px;font-weight:700}
.love-prompts{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.love-prompts::-webkit-scrollbar{height:0}
.love-prompt-btn{flex-shrink:0;padding:6px 11px;border-radius:20px;font-size:11px;font-weight:600;background:var(--s1);border:1px solid var(--b1);color:var(--t2);transition:all 0.18s var(--ease);white-space:nowrap}
.love-prompt-btn:active{transform:scale(0.88)}
.love-compose{display:flex;gap:6px;margin-bottom:14px;align-items:flex-end}
.love-input{flex:1;padding:9px 12px;border-radius:12px;border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none;color:var(--t1);resize:none;min-height:40px;max-height:100px;line-height:1.5;font-family:var(--font);transition:border-color 0.2s,box-shadow 0.2s}
.love-input:focus{border-color:var(--v3);box-shadow:0 0 0 2px var(--v2)}
.love-send{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--r3),var(--v3));border:1px solid var(--b1);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.18s var(--ease)}
.love-send:active{transform:scale(0.8)}
.date-sep{text-align:center;margin:8px 0 5px;font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;display:flex;align-items:center;gap:8px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--b1)}
.msg-wrap{display:flex;margin-bottom:5px;gap:4px;position:relative}
.msg-wrap.right{flex-direction:row-reverse}
.msg-bubble{padding:9px 12px;border-radius:12px;max-width:82%;position:relative;transition:transform 0.15s}
.msg-bubble:active{transform:scale(0.97)}
.msg-text{font-size:12px;color:var(--t1);line-height:1.6}
.msg-footer{display:flex;justify-content:space-between;align-items:center;margin-top:3px;gap:8px}
.msg-from{font-size:7.5px;font-weight:700}
.msg-time{font-size:7.5px;color:var(--t4)}
.msg-edited{font-size:6.5px;color:var(--t4);font-style:italic}
.msg-reactions{display:flex;flex-wrap:wrap;gap:2.5px;margin-top:4px}
.rxn-btn{padding:2px 6px;border-radius:20px;font-size:10px;background:var(--s1);border:1px solid var(--b1);transition:all 0.15s;display:flex;align-items:center;gap:2px}
.rxn-btn.mine{background:var(--s2);border-color:var(--b2)}
.rxn-btn:active{transform:scale(0.88)}
.rxn-count{font-size:8px;color:var(--t3);font-family:var(--mono)}
.reaction-picker{position:absolute;bottom:100%;display:flex;gap:3px;padding:7px 9px;border-radius:10px;background:var(--bg2);border:1px solid var(--b1);z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.5);animation:fadeUp 0.15s ease}
.rxn-pick-btn{font-size:18px;border-radius:8px;padding:3px;transition:transform 0.15s;background:none}
.rxn-pick-btn:active{transform:scale(0.8)}
.msg-act-wrap{display:flex;flex-direction:column;gap:3px;justify-content:center;opacity:0;transition:opacity 0.2s}
.msg-wrap:active .msg-act-wrap,.msg-wrap.show-acts .msg-act-wrap{opacity:1}
.msg-act-btn{width:22px;height:22px;border-radius:7px;background:var(--s2);border:1px solid var(--b1);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all 0.12s}
.msg-act-btn:active{transform:scale(0.88)}
.pin-banner{margin-bottom:8px;padding:9px 11px;border-radius:10px;background:linear-gradient(135deg,rgba(234,179,8,0.06),rgba(234,179,8,0.02));border:1px solid rgba(234,179,8,0.12)}
.pin-banner-lbl{font-size:7px;color:rgba(234,179,8,0.5);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.pin-banner-text{font-size:12px;color:var(--t1);line-height:1.5}
.love-edit-box{background:var(--bg2);border-radius:12px;border:1px solid var(--b1);padding:11px;margin-bottom:10px}
.love-edit-inp{width:100%;padding:8px 10px;border-radius:var(--rad-xs);border:1px solid var(--b1);background:var(--s1);font-size:12px;color:var(--t1);outline:none;resize:none;min-height:48px;font-family:var(--font);line-height:1.5}
.love-edit-inp:focus{border-color:var(--v3)}

/* ─ CALENDAR ─ */
.timeline-item{display:flex;gap:10px;padding:9px 0;position:relative}
.timeline-item+.timeline-item::before{content:'';position:absolute;left:17px;top:0;width:1px;height:9px;background:var(--b1)}
.tl-dot-wrap{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.tl-content{flex:1;padding-top:5px}
.tl-date{font-size:8px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.tl-title{font-size:12.5px;font-weight:700;margin-top:1px}
.tl-sub{font-size:10px;color:var(--t3);margin-top:2px}
.tl-days-badge{font-family:var(--mono);font-size:8.5px;padding:2px 7px;border-radius:20px;font-weight:600;margin-top:4px;display:inline-block}

/* ─ SETTINGS ─ */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
.settings-overlay.open{opacity:1;pointer-events:all}
.settings-panel{position:fixed;top:0;right:-310px;bottom:0;width:290px;max-width:88vw;background:var(--bg2);z-index:201;overflow-y:auto;padding:16px 13px calc(16px + var(--safe-b));transition:right 0.35s cubic-bezier(0.4,0,0.2,1);border-left:1px solid var(--b1)}
.settings-panel.open{right:0}
.sp-title{font-size:13.5px;font-weight:900;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;letter-spacing:-0.3px}
.sp-close{font-size:16px;color:var(--t3);padding:4px 6px;border-radius:var(--rad-xs);background:var(--s1);transition:transform 0.2s var(--ease)}
.sp-close:active{transform:scale(0.82) rotate(90deg)}
.st-cd{background:var(--s1);border-radius:12px;padding:12px;border:1px solid var(--b1);margin-bottom:7px}
.st-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.st-lbl{font-size:12px;font-weight:700}
.st-desc{font-size:10px;color:var(--t3);margin-top:3px;line-height:1.55}
.tgl{width:46px;height:25px;border-radius:25px;flex-shrink:0;position:relative;transition:all 0.35s var(--ease);border:1.5px solid transparent;cursor:pointer}
.tgl.off{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.08)}
.tgl.on{background:var(--abg);border-color:var(--accent);box-shadow:0 0 10px var(--accent)33}
.tgl-k{width:18px;height:18px;border-radius:50%;position:absolute;top:2px;transition:all 0.38s var(--ease);box-shadow:0 2px 5px rgba(0,0,0,0.4)}
.tgl.off .tgl-k{left:2px;background:#4a5568}
.tgl.on .tgl-k{left:24px;background:var(--accent);box-shadow:0 2px 8px var(--accent)66}
.tgl:active .tgl-k{width:22px}
.dbtn{padding:8px 14px;border-radius:var(--rad-xs);font-size:11px;font-weight:700;border:1px solid rgba(244,63,94,0.15);background:rgba(244,63,94,0.05);color:var(--red);transition:all 0.2s var(--ease)}
.dbtn:active{transform:scale(0.9)}
.fb-input{width:100%;padding:8px 10px;border-radius:var(--rad-xs);border:1px solid var(--b1);background:var(--bg);font-family:var(--mono);font-size:9.5px;outline:none;resize:vertical;min-height:60px;color:var(--t1)}
.fb-input:focus{border-color:var(--accent)}
.fb-btn,.cal-btn{padding:9px 0;border-radius:var(--rad-xs);font-size:11.5px;font-weight:700;background:var(--abg);color:var(--accent);border:1px solid var(--abr);width:100%;margin-top:6px;transition:all 0.22s var(--ease)}
.fb-btn:active,.cal-btn:active{transform:scale(0.95)}

/* ─ SCHEDULE EDITOR MODAL ─ */
.smod{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;transition:opacity 0.3s;opacity:0;pointer-events:none}
.smod.open{opacity:1;pointer-events:all}
.smod-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:var(--bg);z-index:10}
.smod-title{font-size:15px;font-weight:900;letter-spacing:-0.4px}
.smod-close{font-size:17px;color:var(--t3);padding:4px 7px;border-radius:var(--rad-xs);background:var(--s1);transition:all 0.2s var(--ease)}
.smod-close:active{transform:scale(0.82) rotate(90deg)}
.smod-tabs{display:flex;gap:4px;padding:9px 16px;border-bottom:1px solid var(--b1)}
.smod-tab{flex:1;padding:7px 0;border-radius:var(--rad-xs);font-size:10.5px;font-weight:800;text-align:center;background:var(--s1);border:1px solid var(--b1);color:var(--t3);transition:all 0.22s var(--ease)}
.smod-tab.on{background:var(--abg);border-color:var(--abr);color:var(--accent)}
.smod-tab:active{transform:scale(0.92)}
.smod-body{flex:1;overflow-y:auto;padding:8px 16px calc(8px + var(--safe-b))}
.smod-block{padding:11px;border-radius:11px;background:var(--s1);border:1px solid var(--b1);margin-bottom:6px;transition:opacity 0.2s}
.smod-block.deleted-block{opacity:0.4;border-style:dashed}
.smod-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px}
.smod-block-name{font-size:12.5px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.smod-block-cat{font-size:7.5px;padding:2px 6px;border-radius:20px;font-weight:700;flex-shrink:0}
.smod-fields{display:flex;gap:5px}
.smod-field{flex:1}
.smod-field-lbl{font-size:7.5px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:2px}
.smod-inp{width:100%;padding:6px 8px;border-radius:7px;border:1px solid var(--b1);background:var(--bg2);font-size:12px;outline:none;color:var(--t1);font-family:var(--mono);transition:border-color 0.2s,box-shadow 0.2s}
.smod-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.smod-btns{display:flex;gap:4px;margin-top:7px}
.smod-save-btn{flex:2;padding:10px;border-radius:var(--rad-xs);font-size:12.5px;font-weight:700;background:var(--accent);color:var(--bg);border:none;transition:all 0.22s var(--ease)}
.smod-save-btn:active{transform:scale(0.94)}
.smod-reset-btn{flex:1;padding:8px;border-radius:var(--rad-xs);font-size:11.5px;font-weight:600;background:rgba(255,255,255,0.03);border:1px solid var(--b1);color:var(--t3);transition:all 0.2s}
.smod-reset-btn:active{transform:scale(0.94)}
.smod-del-btn{width:34px;padding:8px 0;border-radius:var(--rad-xs);font-size:12px;background:rgba(244,63,94,0.06);border:1px solid rgba(244,63,94,0.12);color:#f43f5e;flex-shrink:0;transition:all 0.22s var(--ease)}
.smod-del-btn:active{transform:scale(0.84)}
.smod-restore-btn{width:100%;padding:8px;border-radius:var(--rad-xs);font-size:11px;font-weight:700;background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.12);color:#4ade80;transition:all 0.2s}
.smod-restore-btn:active{transform:scale(0.94)}
.smod-deleted-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--b1)}
.smod-deleted-title{font-size:7.5px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.smod-deleted-title::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ─ TASK EDIT / FOCUS ─ */
.emod{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:998;display:flex;align-items:flex-end;justify-content:center}
.emod-box{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;padding:16px 14px calc(16px + var(--safe-b))}
.emod-title{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.emod-close{font-size:17px;color:var(--t3);padding:4px 6px;transition:transform 0.2s}
.emod-close:active{transform:scale(0.8) rotate(90deg)}
.emod-field{margin-bottom:10px}
.emod-label{font-size:8.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:2px}
.emod-inp{width:100%;padding:9px 12px;border-radius:var(--rad-xs);border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none;color:var(--t1);transition:border-color 0.2s,box-shadow 0.2s}
.emod-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.emod-save{width:100%;padding:12px;border-radius:var(--rad-xs);font-size:13.5px;font-weight:800;background:var(--accent);color:var(--bg);border:none;margin-top:7px;transition:all 0.22s var(--ease)}
.emod-save:active{transform:scale(0.95)}
.focus{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity 0.3s;opacity:0;pointer-events:none}
.focus.vis{opacity:1;pointer-events:all}
.f-lbl{font-size:7.5px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:10px}
.f-nm{font-size:20px;font-weight:900;text-align:center;margin-bottom:4px;letter-spacing:-0.3px}
.f-desc{font-size:11px;color:var(--t2);text-align:center;max-width:260px;line-height:1.65;margin-bottom:28px}
.f-timer{font-family:var(--mono);font-size:62px;font-weight:700;letter-spacing:-3px}
.f-sub{font-size:10.5px;color:var(--t4);margin-top:3px;margin-bottom:28px}
.f-bar{width:180px;height:2px;background:var(--s1);border-radius:2px;margin-bottom:32px;overflow:hidden}
.f-bar-f{height:100%;border-radius:2px;transition:width 1s linear}
.f-exit{padding:12px 30px;border-radius:12px;background:var(--s1);border:1px solid var(--b1);font-size:13.5px;font-weight:700;color:var(--t2);transition:all 0.22s var(--ease)}
.f-exit:active{transform:scale(0.92)}

/* ─ MISC ─ */
.cal-inp{width:100%;padding:9px 12px;border-radius:var(--rad-xs);border:1px solid var(--b1);background:var(--s1);font-size:12.5px;outline:none;color:var(--t1);transition:border-color 0.2s,box-shadow 0.2s}
.cal-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.cal-inp::placeholder{color:var(--t4)}
.note-area{width:100%;padding:9px 12px;border-radius:var(--rad-xs);border:1px solid var(--b1);background:var(--s1);font-size:12.5px;outline:none;color:var(--t1);resize:vertical;min-height:52px;line-height:1.6;font-family:var(--font);transition:border-color 0.2s,box-shadow 0.2s}
.note-area:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--abr)}
.sub-t{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.sub-t::after{content:'';flex:1;height:1px;background:var(--b1)}
.sec-pad{padding:0 16px}
.day-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:7.5px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase}
.xp-toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-16px);padding:6px 14px;border-radius:24px;font-family:var(--mono);font-size:11px;font-weight:700;z-index:500;opacity:0;pointer-events:none;transition:all 0.38s var(--ease);background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.18);color:var(--gold);backdrop-filter:blur(20px)}
.xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:100;display:flex;align-items:stretch;padding:4px 8px calc(4px + var(--safe-b));background:rgba(5,7,9,0.96);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--b1)}
.nav-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:5px 2px;border-radius:10px;font-size:7px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.25s var(--ease)}
.nav-b .nav-i{font-size:16px;line-height:1;transition:transform 0.3s var(--ease)}
.nav-b.on{color:var(--accent);background:var(--abg)}
.nav-b.on .nav-i{transform:scale(1.15) translateY(-1px)}
.nav-b:not(.on){color:var(--t4)}
.nav-b:active .nav-i{transform:scale(0.84)}

/* ─ ENERGY ─ */
.energy-seg{flex:1;height:36px;border-radius:var(--rad-xs);font-size:9.5px;font-weight:700;transition:all 0.22s var(--ease);border:1.5px solid transparent;background:var(--s1);color:var(--t4);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0}
.energy-seg:active{transform:scale(0.88) translateY(1px)}
.energy-seg.on{color:var(--bg)}
.energy-seg span.esn{font-size:6.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8}
.brain-btn{padding:9px 12px;border-radius:10px;font-size:11.5px;font-weight:700;transition:all 0.25s var(--ease);background:var(--s1);border:1.5px solid var(--b1);color:var(--t2);display:flex;align-items:center;gap:5px}
.brain-btn:active{transform:scale(0.88)}
.brain-btn .bs-em{font-size:15px}
.brain-btn .bs-lbl{font-size:10.5px;font-weight:700}
.gt-chart-wrap{background:var(--bg3);border-radius:var(--rad-xs);padding:9px;margin-top:10px;border:1px solid var(--b1)}
.gt-chart-legend{display:flex;gap:10px;margin-top:5px;justify-content:center}
.gt-chart-legend span{font-size:8px;color:var(--t4);display:flex;align-items:center;gap:3px}
.wins-area{width:100%;padding:10px 12px;border-radius:var(--rad-xs);border:1px solid var(--b1);background:var(--s1);font-size:12px;outline:none;color:var(--t1);resize:none;min-height:65px;line-height:1.7;font-family:var(--font);transition:border-color 0.2s,box-shadow 0.2s}
.wins-area:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(74,222,128,0.08)}
.wins-area::placeholder{color:var(--t4)}

/* ─ UNDO TOAST ─ */
.undo-toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);left:50%;transform:translateX(-50%) translateY(20px);padding:8px 16px;border-radius:12px;font-size:12px;font-weight:700;z-index:400;opacity:0;pointer-events:none;transition:all 0.3s var(--ease);background:var(--bg3);border:1px solid var(--b2);color:var(--t1);backdrop-filter:blur(20px);display:flex;align-items:center;gap:10px}
.undo-toast.show{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
.undo-btn{color:var(--accent);font-weight:800;font-size:12px;padding:2px 4px}

/* ─ ADD BLOCK BUTTON ─ */
.add-block-row{padding:6px 16px 10px}
.add-block-btn{width:100%;padding:10px;border-radius:var(--rad-xs);font-size:12px;font-weight:700;background:var(--s1);border:1px dashed var(--b2);color:var(--t3);transition:all 0.2s var(--ease);display:flex;align-items:center;justify-content:center;gap:6px}
.add-block-btn:active{transform:scale(0.97)}

.anim{animation:fadeUp 0.3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--t4);font-size:10px;letter-spacing:3px;font-weight:700">LOADING</div></div>
<div class="xp-toast" id="xpToast"></div>
<div class="undo-toast" id="undoToast"><span id="undoText"></span><button class="undo-btn" id="undoBtn" onclick="undoToggle()">UNDO</button></div>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
var RUTIK_BASE=[
{id:"r1",time:"6:30 AM",block:"Wake + Morning Routine",dur:30,cat:"routine",desc:"Water, brush, freshen, breakfast. Protein first. No phone 10 min.",sync:1},
{id:"r2",time:"7:00 AM",block:"Anki Morning Burst",dur:25,cat:"anki",desc:"Due cards COMPLETED subjects only. Cap: 100 cards or 25 min.",sync:1},
{id:"r3",time:"7:25 AM",block:"Reading Block 1",dur:95,cat:"study",desc:"First Aid / Marrow RR. Pen in hand, margin notes. Sticky notes for volatile facts."},
{id:"r4",time:"9:00 AM",block:"Physical Break",dur:15,cat:"health",desc:"Quick shower if needed, water refill, bathroom, brief walk."},
{id:"r5",time:"9:15 AM",block:"Reading Block 2",dur:55,cat:"study",desc:"Continue today\u2019s subject. Same sticky note system.",sync:2},
{id:"r6",time:"10:10 AM",block:"Card Making",dur:15,cat:"anki",desc:"Sticky notes \u2192 Anki cards. Cap: 12 cards.",sync:2},

// ── HAPTICS ─────────────────────────────────────────────────────────────────
function haptic(type){
  if(!navigator.vibrate)return;
  if(type==="light")navigator.vibrate(8);
  else if(type==="medium")navigator.vibrate(15);
  else if(type==="heavy")navigator.vibrate([15,30,15]);
  else if(type==="success")navigator.vibrate([10,50,10,50,20]);
  else if(type==="error")navigator.vibrate([30,60,30]);
  else navigator.vibrate(10);
}

var scheduledNotifs={};
function requestNotifPermission(){
  if(!("Notification" in window))return;
  if(Notification.permission==="granted"){S.notifEnabled=true;save();scheduleBlockNotifs();return}
  Notification.requestPermission().then(function(p){S.notifEnabled=(p==="granted");save();if(S.notifEnabled)scheduleBlockNotifs();render()})
}
function scheduleBlockNotifs(){
  Object.keys(scheduledNotifs).forEach(function(k){clearTimeout(scheduledNotifs[k])});
  scheduledNotifs={};
  if(!S.notifEnabled||Notification.permission!=="granted")return;
  var sc=sched(),now=nm(),person=PERSONALITY[S.p];
  sc.forEach(function(task){
    var start=pt(task.time),diff=(start-now)*60000-120000;
    if(diff>0&&diff<86400000){
      scheduledNotifs[task.id]=setTimeout(function(){
        var p=person||PERSONALITY.rutik;
        new Notification("StudySync \u2022 "+(S.p==="rutik"?"Rutik":"Vaishnavi"),{
          body:task.block+" starts in 2 min",
          icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%2308090f' width='100' height='100' rx='22'/%3E%3Ctext y='66' x='50' text-anchor='middle' font-size='48'%3E\uD83D\uDCDA%3C/text%3E%3C/svg%3E",
          tag:task.id,silent:false
        });
        haptic("medium");
      },diff);
    }
  });
}

function pt(t){var p=t.split(" "),hm=p[0].split(":"),h=parseInt(hm[0]),m=parseInt(hm[1]);if(p[1]==="PM"&&h!==12)h+=12;if(p[1]==="AM"&&h===12)h=0;return h*60+m}
function nm(){var n=new Date();return n.getHours()*60+n.getMinutes()}
