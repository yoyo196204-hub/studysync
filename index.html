<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07060b">
<title>StudySync</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07060b;--card:rgba(255,255,255,0.03);--card2:rgba(255,255,255,0.05);
  --glass:rgba(255,255,255,0.04);--glass-b:rgba(255,255,255,0.06);
  --t1:#f4f0fb;--t2:rgba(244,240,251,0.6);--t3:rgba(244,240,251,0.3);--t4:rgba(244,240,251,0.12);
  --r:#5eead4;--r2:rgba(94,234,212,0.08);--r3:rgba(94,234,212,0.18);--rg:rgba(94,234,212,0.4);
  --v:#fb7fbb;--v2:rgba(251,127,187,0.08);--v3:rgba(251,127,187,0.18);--vg:rgba(251,127,187,0.4);
  --accent:var(--r);--abg:var(--r2);--abr:var(--r3);--ag:var(--rg);
  --study:#5eead4;--anki:#c4b5fd;--mcq:#fdba74;--health:#86efac;
  --routine:#94a3b8;--brk:#fde047;--leisure:#f9a8d4;--work:#93c5fd;--sleep:#a5b4fc;
  --red:#fb7185;--green:#4ade80;--gold:#fbbf24;
  --font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --rad:20px;--rad-s:14px;--rad-xs:10px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --nav-h:62px;
  --ease:cubic-bezier(0.22,1,0.36,1)
}
html{background:var(--bg)}
body{font-family:var(--font);color:var(--t1);background:var(--bg);max-width:520px;margin:0 auto;min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-top:var(--safe-t);padding-bottom:calc(var(--nav-h) + var(--safe-b) + 16px);position:relative}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:0;height:0}
::selection{background:var(--accent);color:var(--bg)}

/* ─── MESH GRADIENT BG ─── */
.mesh{position:fixed;top:0;left:0;right:0;height:100vh;pointer-events:none;z-index:0;overflow:hidden}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.07;animation:float 20s ease infinite}
.mesh-orb:nth-child(1){width:300px;height:300px;top:-80px;left:-60px;animation-delay:0s}
.mesh-orb:nth-child(2){width:250px;height:250px;bottom:20%;right:-40px;animation-delay:-7s}
.mesh-orb:nth-child(3){width:180px;height:180px;top:40%;left:30%;animation-delay:-13s;opacity:0.04}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.1)}66%{transform:translate(-20px,15px) scale(0.95)}}

/* ─── NOISE TEXTURE ─── */
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.5}

#app{position:relative;z-index:1}

/* ─── GLASS CARD ─── */
.gc{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:var(--rad)}

/* ─── HEADER ─── */
.hdr{position:sticky;top:0;z-index:100;padding:10px 16px 8px;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);background:rgba(7,6,11,0.85)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hdr-id{display:flex;align-items:center;gap:10px}
.avatar{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;letter-spacing:-0.5px;position:relative;overflow:hidden}
.avatar::before{content:'';position:absolute;inset:0;opacity:0.15}
.hdr-meta{display:flex;flex-direction:column}
.hdr-name{font-size:17px;font-weight:800;letter-spacing:-0.5px;line-height:1.1}
.hdr-sub{font-size:9px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:4px}
.hdr-sub .dot{width:4px;height:4px;border-radius:50%}
.hdr-right{display:flex;align-items:center;gap:6px}
.time-pill{font-family:var(--mono);font-size:13px;font-weight:600;padding:6px 10px;border-radius:10px;background:var(--card);border:1px solid var(--glass-b);letter-spacing:-1px}
.time-sec{font-size:8px;color:var(--t4);margin-left:1px}
.hdr-btn{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--glass-b);font-size:14px;transition:all 0.2s var(--ease)}
.hdr-btn:active{transform:scale(0.82)}

/* ─── PROFILE SWITCH ─── */
.psw{display:flex;margin:0 16px 8px;background:var(--card);border-radius:14px;padding:3px;position:relative;border:1px solid var(--glass-b)}
.psw-btn{flex:1;padding:8px 0;border-radius:11px;font-size:12px;font-weight:700;position:relative;z-index:2;text-align:center;transition:all 0.3s var(--ease);letter-spacing:-0.2px}
.psw-btn:active{transform:scale(0.95)}
.psw-pill{position:absolute;top:3px;height:calc(100% - 6px);width:calc(50% - 3px);border-radius:11px;transition:all 0.5s var(--ease);z-index:1}

/* ─── PROGRESS RING (header) ─── */
.day-ring{position:relative;width:34px;height:34px;flex-shrink:0}
.day-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.day-ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;font-weight:700;color:var(--accent)}

/* ─── BENTO HERO ─── */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 8px}
.bento-card{padding:14px;border-radius:var(--rad);position:relative;overflow:hidden;transition:transform 0.2s var(--ease)}
.bento-card:active{transform:scale(0.97)}
.bento-card.full{grid-column:1/-1}
.bento-lbl{font-size:7.5px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:6px}
.bento-val{font-family:var(--mono);font-size:28px;font-weight:800;letter-spacing:-2px;line-height:1}
.bento-sub{font-size:9.5px;color:var(--t2);margin-top:4px;font-weight:500}

/* ─── NOW PLAYING (dramatic) ─── */
.now{margin:0 16px 8px;padding:16px 18px;border-radius:var(--rad);position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s var(--ease)}
.now:active{transform:scale(0.98)}
.now-bg{position:absolute;inset:0;opacity:0.06}
.now-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--bg))}
.now-content{position:relative;z-index:1}
.now-eyebrow{font-size:7px;text-transform:uppercase;letter-spacing:3px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.now-eyebrow .pulse-dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor}50%{opacity:0.5;box-shadow:0 0 0 4px transparent}}
.now-title{font-size:18px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.now-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.now-timer-big{font-family:var(--mono);font-size:32px;font-weight:700;letter-spacing:-3px;line-height:1}
.now-ring-sm{width:44px;height:44px;position:relative}
.now-ring-sm svg{width:100%;height:100%;transform:rotate(-90deg)}
.now-ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700}
.now-bar{height:3px;border-radius:3px;background:rgba(255,255,255,0.04);margin-top:12px;overflow:hidden}
.now-bar-fill{height:100%;border-radius:3px;transition:width 1s linear;position:relative}
.now-bar-fill::after{content:'';position:absolute;right:0;top:-2px;width:7px;height:7px;border-radius:50%;background:inherit;box-shadow:0 0 10px currentColor}

/* ─── GREETING ─── */
.greet{margin:0 16px 8px;padding:13px 16px;border-radius:var(--rad-s);position:relative;overflow:hidden}
.greet::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:2px}
.greet-text{font-size:12px;color:var(--t2);line-height:1.7;letter-spacing:0.1px;position:relative}
.greet-foot{font-size:7px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-top:5px;position:relative}

/* ─── TASK LIST ─── */
.tasks-section{padding:0 16px}
.group-label{display:flex;align-items:center;gap:8px;padding:12px 0 6px}
.group-name{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--t3)}
.group-line{flex:1;height:1px;background:linear-gradient(90deg,var(--glass-b),transparent)}
.group-count{font-family:var(--mono);font-size:8px;color:var(--t4);background:var(--card);padding:2px 7px;border-radius:20px}

.task{padding:12px;margin-bottom:6px;border-radius:var(--rad-s);background:var(--card);border:1px solid rgba(255,255,255,0.03);transition:all 0.25s var(--ease);position:relative;overflow:hidden}
.task.active{border-color:rgba(253,224,71,0.15)}
.task.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);border-radius:2px}
.task.done{opacity:0.25}
.task-top{display:flex;align-items:center;gap:10px}
.check{width:24px;height:24px;border-radius:8px;flex-shrink:0;border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;transition:all 0.3s var(--ease);font-size:10px;font-weight:900;color:var(--bg)}
.check:active{transform:scale(0.7)}
.check.on{animation:checkPop 0.4s var(--ease)}
.check .chk{opacity:0;transition:opacity 0.15s}.check.on .chk{opacity:1}
@keyframes checkPop{0%{transform:scale(0.5)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.task-info{flex:1;min-width:0}
.task-name{font-size:13.5px;font-weight:600;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task.done .task-name{text-decoration:line-through;color:var(--t3)}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:3px}
.task-time{font-family:var(--mono);font-size:9px;color:var(--t4)}
.task.active .task-time{color:var(--gold)}
.task-badge{font-size:7px;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:0.3px}
.task-dur{font-size:9px;color:var(--t4)}
.task-late{font-size:7.5px;color:var(--red);font-weight:700;animation:blink 1.3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.task-expand{font-size:9px;color:var(--t4);padding:4px;transition:transform 0.2s;flex-shrink:0}
.task-expand.open{transform:rotate(180deg)}
.task-detail{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.task-detail.open{max-height:280px;padding-top:8px}
.task-desc{font-size:11px;color:var(--t2);line-height:1.65;padding-left:34px}
.task-actual{display:flex;align-items:center;gap:6px;padding-left:34px;margin-top:7px}
.task-actual span{font-size:10px;color:var(--t3)}
.task-actual input{width:50px;padding:5px;border-radius:8px;border:1px solid var(--glass-b);background:var(--card);font-family:var(--mono);font-size:12px;text-align:center;outline:none}
.task-actual input:focus{border-color:var(--accent)}

/* ─── STATS ─── */
.stat-pills{display:flex;gap:4px;padding:0 16px;margin-bottom:10px}
.stat-pill{flex:1;padding:8px 0;border-radius:var(--rad-xs);font-size:9px;font-weight:700;text-align:center;background:var(--card);border:1px solid var(--glass-b);color:var(--t3);transition:all 0.2s var(--ease);text-transform:uppercase;letter-spacing:0.8px}
.stat-pill:active{transform:scale(0.94)}
.stat-pill.on{color:var(--accent);background:var(--abg);border-color:var(--abr)}

.cat-bento{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 10px}
.cat-item{padding:12px 8px;border-radius:var(--rad-s);background:var(--card);border:1px solid var(--glass-b);text-align:center;transition:transform 0.15s}
.cat-item:active{transform:scale(0.95)}
.cat-item.done{border-color:rgba(74,222,128,0.12)}
.cat-icon{font-size:20px;display:block;margin-bottom:4px}
.cat-name{font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;display:block}
.cat-pct{font-family:var(--mono);font-size:18px;font-weight:700;display:block;margin:4px 0}
.cat-track{height:2.5px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden;margin-top:4px}
.cat-fill{height:100%;border-radius:2px;transition:width 0.6s var(--ease)}

/* ─── HEATMAP ─── */
.hm-wrap{padding:14px;border-radius:var(--rad);background:var(--card);border:1px solid var(--glass-b);margin:0 16px 10px}
.hm-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hm-label{font-size:8px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px}
.hm-legend{display:flex;align-items:center;gap:2px;font-size:7px;color:var(--t4)}
.hm-sq{width:8px;height:8px;border-radius:2px}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2.5px}
.hm-cell{aspect-ratio:1;border-radius:3px;transition:all 0.3s}

/* ─── BARS ─── */
.bars{display:flex;gap:4px;align-items:flex-end;height:60px}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-num{font-family:var(--mono);font-size:7.5px;color:var(--t4);min-height:12px}
.bar-fill{width:100%;border-radius:4px;transition:height 0.5s var(--ease)}
.bar-day{font-size:6.5px;color:var(--t4);font-weight:700;margin-top:2px}

/* ─── LEADERBOARD ─── */
.lb-arena{display:flex;gap:12px;padding:0 16px 12px;align-items:flex-start}
.lb-player{flex:1;padding:16px 12px;border-radius:var(--rad);background:var(--card);border:1px solid var(--glass-b);text-align:center;position:relative;overflow:hidden}
.lb-player.winner{border-color:rgba(251,191,36,0.2)}
.lb-player.winner::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(251,191,36,0.04),transparent);pointer-events:none}
.lb-crown{position:absolute;top:6px;right:8px;font-size:16px;animation:crownFloat 3s ease infinite}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-3px) rotate(5deg)}}
.lb-pct-ring{margin:0 auto 8px}
.lb-name{font-size:14px;font-weight:800;letter-spacing:-0.3px}
.lb-xp{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px}
.lb-level{font-size:9px;font-weight:700;margin-top:3px}
.lb-sparks{display:flex;gap:2.5px;justify-content:center;margin-top:7px}
.lb-spark{width:7px;height:7px;border-radius:2px}
.lb-xpbar{height:3px;border-radius:3px;background:rgba(255,255,255,0.04);margin-top:7px;overflow:hidden}
.lb-xpbar-fill{height:100%;border-radius:3px}
.lb-vs-icon{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding-top:30px;flex-shrink:0}

.lb-compare{padding:0 16px 10px}
.lb-compare-title{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--t4);margin-bottom:10px}
.lb-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.lb-row-lbl{font-size:9.5px;font-weight:700;width:40px;flex-shrink:0}
.lb-row-track{flex:1;height:5px;border-radius:4px;background:var(--card);overflow:hidden}
.lb-row-fill{height:100%;border-radius:4px;transition:width 0.6s var(--ease)}
.lb-row-val{font-family:var(--mono);font-size:9px;font-weight:700;width:42px;text-align:right;flex-shrink:0}
.badges-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px 12px}
.badge{padding:5px 10px;border-radius:20px;font-size:9px;font-weight:700;display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--glass-b)}
.lb-motivate{text-align:center;padding:20px 16px;margin:0 16px 10px;border-radius:var(--rad);background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--glass-b)}

/* ─── LOVE ─── */
.love-view{padding:12px 16px}
.love-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.love-streak-pill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid rgba(255,255,255,0.05);font-size:10px;font-weight:700}
.quick-btns{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.quick-btns::-webkit-scrollbar{height:0}
.quick-btn{flex-shrink:0;padding:7px 12px;border-radius:20px;font-size:11px;font-weight:600;background:var(--card);border:1px solid var(--glass-b);color:var(--t2);transition:all 0.15s;white-space:nowrap}
.quick-btn:active{transform:scale(0.9)}
.compose{display:flex;gap:6px;margin-bottom:16px;align-items:flex-end}
.compose-input{flex:1;padding:11px 14px;border-radius:16px;border:1px solid var(--glass-b);background:var(--card);font-size:13px;outline:none;color:var(--t1);resize:none;min-height:44px;max-height:100px;line-height:1.5;font-family:var(--font);transition:border-color 0.2s}
.compose-input:focus{border-color:var(--v3)}
.compose-send{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--r3),var(--v3));border:1px solid var(--glass-b);font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s}
.compose-send:active{transform:scale(0.8)}
.msg-date{text-align:center;margin:12px 0 6px;font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;display:flex;align-items:center;gap:8px}
.msg-date::before,.msg-date::after{content:'';flex:1;height:1px;background:var(--glass-b)}
.msg-row{display:flex;margin-bottom:5px;gap:4px;position:relative}
.msg-row.right{flex-direction:row-reverse}
.bubble{padding:11px 14px;border-radius:16px;max-width:82%;position:relative}
.bubble:active{transform:scale(0.97)}
.bubble-text{font-size:12.5px;color:var(--t1);line-height:1.65}
.bubble-foot{display:flex;justify-content:space-between;align-items:center;margin-top:3px;gap:8px}
.bubble-from{font-size:7.5px;font-weight:700}
.bubble-time{font-size:7.5px;color:var(--t4)}
.bubble-edited{font-size:6.5px;color:var(--t4);font-style:italic}
.bubble-rxns{display:flex;flex-wrap:wrap;gap:2.5px;margin-top:4px}
.rxn{padding:2px 6px;border-radius:20px;font-size:10px;background:var(--card);border:1px solid var(--glass-b);display:flex;align-items:center;gap:2px;transition:all 0.15s}
.rxn.mine{background:var(--card2);border-color:rgba(255,255,255,0.1)}
.rxn:active{transform:scale(0.85)}
.rxn-ct{font-size:8px;color:var(--t3);font-family:var(--mono)}
.rxn-picker{position:absolute;bottom:100%;display:flex;gap:3px;padding:7px 9px;border-radius:12px;background:rgba(7,6,11,0.95);border:1px solid var(--glass-b);z-index:50;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
.rxn-opt{font-size:18px;padding:3px;background:none;transition:transform 0.12s}
.rxn-opt:active{transform:scale(0.75)}
.msg-actions{display:flex;flex-direction:column;gap:3px;justify-content:center;opacity:0;transition:opacity 0.2s}
.msg-row:active .msg-actions{opacity:1}
.msg-act{width:22px;height:22px;border-radius:7px;background:var(--card2);border:1px solid var(--glass-b);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--t3)}
.msg-act:active{transform:scale(0.85)}
