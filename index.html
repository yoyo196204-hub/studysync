<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090f">
<meta name="mobile-web-app-capable" content="yes">
<title>StudySync</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08090f;--bg2:#0e1019;--bg3:#141722;
--s1:rgba(255,255,255,0.04);--s2:rgba(255,255,255,0.065);--s3:rgba(255,255,255,0.1);
--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);
--t1:#f0f2f5;--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.28);--t4:rgba(255,255,255,0.14);
--r:#36d7b7;--r2:rgba(54,215,183,0.1);--r3:rgba(54,215,183,0.2);
--v:#e879a8;--v2:rgba(232,121,168,0.1);--v3:rgba(232,121,168,0.2);
--accent:var(--r);--abg:var(--r2);--abr:var(--r3);
--study:#36d7b7;--anki:#b794f6;--mcq:#f6ad55;--health:#68d391;
--routine:#a0aec0;--brk:#f6e05e;--leisure:#f687b3;--work:#63b3ed;--sleep:#7f9cf5;
--red:#fc5c65;--green:#26de81;
--font:'Outfit',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
--rad:16px;--rad-s:10px;
--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html{background:var(--bg)}
body{font-family:var(--font);color:var(--t1);background:var(--bg);max-width:520px;margin:0 auto;
min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;padding-top:var(--safe-t)}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:0;height:0}
.hdr{position:sticky;top:0;z-index:100;padding:14px 16px 0;background:linear-gradient(180deg,var(--bg) 80%,transparent);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hdr-date{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:600}
.hdr-name{font-size:21px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;margin-top:1px}
.clock-time{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--t1);letter-spacing:-1.5px;line-height:1;text-align:right}
.clock-sec{font-size:13px;color:var(--t4);font-weight:400}
.clock-per{font-size:10px;color:var(--t3);margin-left:1px;font-weight:500}
.psw{display:flex;background:var(--s1);border-radius:14px;padding:3px;margin-bottom:10px;position:relative;overflow:hidden}
.psw-btn{flex:1;padding:11px 0;border-radius:11px;font-size:13px;font-weight:600;position:relative;z-index:2;text-align:center;transition:color 0.3s}
.psw-bg{position:absolute;top:3px;height:calc(100% - 6px);width:calc(50% - 3px);border-radius:11px;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);z-index:1}
.nav{display:flex;gap:2px;padding-bottom:12px;border-bottom:1px solid var(--b1)}
.nav-b{flex:1;padding:9px 0;border-radius:var(--rad-s);font-size:10px;font-weight:600;text-align:center;letter-spacing:0.4px;transition:all 0.2s;text-transform:uppercase}
.nav-b.on{background:var(--s2);color:var(--t1)}
.nav-b:not(.on){color:var(--t4)}
.cur{margin:14px 16px 8px;padding:16px;border-radius:var(--rad);background:var(--s1);border:1px solid var(--b1);position:relative;overflow:hidden}
.cur-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.cur-top{display:flex;align-items:center;gap:12px}
.cur-info{flex:1;min-width:0}
.cur-lbl{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.cur-name{font-size:15px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cur-cd{font-family:var(--mono);font-size:24px;font-weight:600;flex-shrink:0;letter-spacing:-1px}
.cur-bar{height:3px;background:var(--s1);border-radius:2px;margin-top:12px;overflow:hidden}
.cur-bar-fill{height:100%;border-radius:2px;transition:width 1s linear}
.qs{display:flex;gap:8px;padding:6px 16px 10px;overflow-x:auto}
.qs::-webkit-scrollbar{display:none}
.q{padding:10px 14px;border-radius:12px;flex-shrink:0;background:var(--s1);border:1px solid var(--b1);min-width:85px}
.q-l{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.q-v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:3px}
.tg{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--t4);padding:18px 16px 8px}
.tk{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.15s}
.tk.act{background:rgba(246,224,94,0.03)}
.tk.dn{opacity:0.55}
.tk-main{display:flex;align-items:flex-start;gap:12px}
.cb{width:22px;height:22px;border-radius:7px;flex-shrink:0;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.cb.on{animation:pop 0.35s cubic-bezier(0.34,1.56,0.64,1)}
.cb .ck{font-size:11px;font-weight:800;opacity:0;transition:opacity 0.15s;color:var(--bg)}
.cb.on .ck{opacity:1}
@keyframes pop{0%{transform:scale(0.7)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.tk-c{flex:1;min-width:0}
.tk-r1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tk-time{font-family:var(--mono);font-size:11px;color:var(--t4);min-width:64px;font-weight:400}
.tk.act .tk-time{color:#f6e05e}
.tk-nm{font-size:13.5px;font-weight:600;transition:all 0.2s}
.tk.dn .tk-nm{text-decoration:line-through;color:var(--t3)}
.tk-r2{display:flex;gap:6px;margin-top:5px;align-items:center;flex-wrap:wrap}
.tk-cat{font-size:8px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase}
.tk-dur{font-size:10px;color:var(--t4)}
.tk-ov{font-size:9px;color:var(--red);font-weight:700}
.tk-exp{color:var(--t4);font-size:9px;padding:4px;transition:transform 0.25s;flex-shrink:0}
.tk-exp.op{transform:rotate(180deg)}
.tk-det{max-height:0;overflow:hidden;transition:max-height 0.35s ease;padding:0 0 0 34px}
.tk-det.op{max-height:250px;padding:10px 0 4px 34px}
.tk-desc{font-size:12px;color:var(--t2);line-height:1.65}
.act-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.act-lbl{font-size:11px;color:var(--t3)}
.act-inp{width:52px;padding:5px 6px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);font-family:var(--mono);font-size:13px;text-align:center;outline:none}
.act-inp:focus{border-color:var(--accent)}
.sec{padding:16px}
.sec-t{font-size:18px;font-weight:800;margin-bottom:16px}
.scards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.sc{flex:1 1 130px;min-width:115px;padding:16px;border-radius:var(--rad);background:var(--s1);border:1px solid var(--b1)}
.sc-l{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.sc-v{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px}
.sc-s{font-size:10px;color:var(--t4);margin-top:3px}
.sub-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:10px}
.cr{display:flex;align-items:center;gap:10px;padding:5px 0}
.cr-i{font-size:13px;width:18px;text-align:center}
.cr-l{font-size:11px;color:var(--t2);width:50px}
.cr-bt{flex:1;height:5px;background:var(--s1);border-radius:3px;overflow:hidden}
.cr-bf{height:100%;border-radius:3px;transition:width 0.5s ease}
.cr-c{font-family:var(--mono);font-size:10px;color:var(--t4);min-width:36px;text-align:right}
.td{display:flex;height:24px;border-radius:8px;overflow:hidden;background:var(--s1);margin-bottom:8px}
.td-s{display:flex;align-items:center;justify-content:center;font-size:9px;transition:width 0.4s}
.td-lg{display:flex;flex-wrap:wrap;gap:8px}
.td-lg span{font-size:9px;color:var(--t3);display:flex;align-items:center;gap:4px}
.td-lg .dt{width:7px;height:7px;border-radius:2px;display:inline-block}
.lb-cds{display:flex;gap:12px;margin-bottom:16px}
.lb-cd{flex:1;padding:18px 12px;border-radius:var(--rad);text-align:center;border:1px solid var(--b1);background:var(--s1)}
.lb-cd.win{border-color:rgba(246,224,94,0.2);background:rgba(246,224,94,0.04)}
.lb-nm{font-size:13px;font-weight:700;margin-bottom:10px}
.lb-pc{font-family:var(--mono);font-size:30px;font-weight:600}
.lb-sb{font-size:10px;color:var(--t3);margin-top:4px}
.lb-comp{background:var(--s1);border-radius:var(--rad);padding:16px;border:1px solid var(--b1);margin-bottom:12px}
.lb-ct{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px}
.lb-row{margin-bottom:10px}
.lb-rt{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.lb-bt{height:7px;background:var(--s1);border-radius:4px;overflow:hidden}
.lb-bf{height:100%;border-radius:4px;transition:width 0.5s ease}
.lb-mot{text-align:center;padding:28px 16px;border-radius:var(--rad);background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid var(--b1)}
/* HEATMAP */
.hm{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:6px}
.hm-cell{width:14px;height:14px;border-radius:3px;transition:background 0.2s}
.hm-labels{display:flex;justify-content:space-between;margin-bottom:4px}
.hm-labels span{font-size:8px;color:var(--t4);font-weight:600}
.hm-legend{display:flex;align-items:center;gap:3px;justify-content:flex-end;margin-top:4px}
.hm-legend span{font-size:8px;color:var(--t4)}
.hm-legend .hm-lc{width:10px;height:10px;border-radius:2px}
/* WEEK VIEW */
.wk{background:var(--s1);border-radius:var(--rad);border:1px solid var(--b1);overflow:hidden;margin-bottom:14px}
.wk-hdr{display:flex;padding:10px 12px;border-bottom:1px solid var(--b1);gap:4px}
.wk-hdr span{flex:1;text-align:center;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:4px 0}
.wk-hdr span.today{color:var(--accent);background:var(--abg);border-radius:6px}
.wk-body{display:flex;padding:8px 12px 12px;gap:4px;min-height:140px}
.wk-col{flex:1;display:flex;flex-direction:column;gap:2px}
.wk-blk{border-radius:3px;min-height:3px}
.cal-card{background:var(--s1);border-radius:var(--rad);padding:16px;border:1px solid var(--b1);margin-bottom:12px}
.cal-tt{font-size:14px;font-weight:700;margin-bottom:8px}
.cal-desc{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:10px}
.cal-inp{width:100%;padding:11px 14px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none}
.cal-inp:focus{border-color:var(--accent)}
.cal-inp::placeholder{color:var(--t4)}
.cal-btn{margin-top:8px;padding:11px 0;border-radius:var(--rad-s);font-size:13px;font-weight:600;background:var(--abg);color:var(--accent);border:1px solid var(--abr);width:100%;transition:transform 0.1s}
.cal-btn:active{transform:scale(0.98)}
.cal-iframe{border-radius:12px;overflow:hidden;border:1px solid var(--b1);margin-top:12px}
.cal-iframe iframe{width:100%;height:420px;border:none}
.st-cd{background:var(--s1);border-radius:var(--rad);padding:16px;border:1px solid var(--b1);margin-bottom:10px}
.st-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.st-lbl{font-size:14px;font-weight:600}
.st-desc{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.6}
.tgl{width:46px;height:26px;border-radius:13px;flex-shrink:0;position:relative;transition:background 0.3s}
.tgl.off{background:rgba(255,255,255,0.1)}
.tgl.on{background:var(--accent)}
.tgl-k{width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:3px;transition:left 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.tgl.off .tgl-k{left:3px}
.tgl.on .tgl-k{left:23px}
.dtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.dtag{font-size:9px;padding:4px 10px;border-radius:20px;background:var(--s2);color:var(--t2);font-weight:500}
.dbtn{padding:10px 18px;border-radius:var(--rad-s);font-size:12px;font-weight:600;border:1px solid rgba(252,92,101,0.2);background:rgba(252,92,101,0.06);color:var(--red);transition:transform 0.1s}
.dbtn:active{transform:scale(0.97)}
.sync-dot{width:6px;height:6px;border-radius:3px;display:inline-block}
.sync-dot.on{background:var(--green);animation:pulse 2s infinite}
.sync-dot.off{background:var(--t4)}
.fb-input{width:100%;padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--bg2);font-family:var(--mono);font-size:11px;outline:none;resize:vertical;min-height:80px;color:var(--t1)}
.fb-input:focus{border-color:var(--accent)}
.fb-btn{margin-top:8px;padding:11px 0;border-radius:var(--rad-s);font-size:13px;font-weight:600;background:var(--abg);color:var(--accent);border:1px solid var(--abr);width:100%;transition:transform 0.1s}
.fb-btn:active{transform:scale(0.98)}
.focus{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity 0.35s;opacity:0;pointer-events:none}
.focus.vis{opacity:1;pointer-events:all}
.f-lbl{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:14px}
.f-nm{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.f-desc{font-size:12px;color:var(--t2);text-align:center;max-width:280px;line-height:1.6;margin-bottom:36px}
.f-timer{font-family:var(--mono);font-size:72px;font-weight:600;letter-spacing:-3px}
.f-sub{font-size:11px;color:var(--t4);margin-top:4px;margin-bottom:36px}
.f-bar{width:220px;height:4px;background:var(--s1);border-radius:2px;margin-bottom:40px;overflow:hidden}
.f-bar-f{height:100%;border-radius:2px;transition:width 1s linear}
.f-exit{padding:14px 36px;border-radius:14px;background:var(--s1);border:1px solid var(--b1);font-size:14px;font-weight:600;color:var(--t2);transition:transform 0.1s}
.f-exit:active{transform:scale(0.97)}
/* EDIT MODAL */
.emod{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:998;display:flex;align-items:flex-end;justify-content:center;padding:0}
.emod-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;padding:20px 16px calc(20px + var(--safe-b))}
.emod-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.emod-close{font-size:20px;color:var(--t3);padding:4px 8px}
.emod-field{margin-bottom:12px}
.emod-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
.emod-inp{width:100%;padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:14px;outline:none;color:var(--t1)}
.emod-inp:focus{border-color:var(--accent)}
.emod-save{width:100%;padding:13px;border-radius:var(--rad-s);font-size:14px;font-weight:700;background:var(--accent);color:var(--bg);border:none;margin-top:8px;transition:transform 0.1s}
.emod-save:active{transform:scale(0.98)}
/* NOTES */
.note-area{width:100%;padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none;color:var(--t1);resize:vertical;min-height:60px;line-height:1.6}
.note-area:focus{border-color:var(--accent)}
.anim{animation:fadeUp 0.35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bspace{height:calc(24px + var(--safe-b))}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:rgba(255,255,255,0.3)">Loading...</div></div>
<script>
var RUTIK_BASE=[
{id:"r1",time:"6:30 AM",block:"Wake + Morning Routine",dur:30,cat:"routine",desc:"Water, brush, freshen, breakfast sitting down. Protein first. No phone 10 min. 30 min of being human.",sync:1},
{id:"r2",time:"7:00 AM",block:"Anki Morning Burst",dur:25,cat:"anki",desc:"Due cards COMPLETED subjects only. Cap: 100 cards or 25 min. Clear overnight review debt before best hours.",sync:1},
{id:"r3",time:"7:25 AM",block:"Reading Block 1",dur:95,cat:"study",desc:"First Aid / Marrow RR. Pen in hand, margin notes. Sticky note for volatile facts (3 sec each). Do NOT open Anki. Phone in another room."},
{id:"r4",time:"9:00 AM",block:"Physical Break",dur:15,cat:"health",desc:"Quick shower if needed, water refill, bathroom, brief walk. Sit back down refreshed. Not a checklist."},
{id:"r5",time:"9:15 AM",block:"Reading Block 2",dur:55,cat:"study",desc:"Continue today's subject. Same sticky note system. Last 5 min: mentally note how many sticky facts accumulated.",sync:2},
{id:"r6",time:"10:10 AM",block:"Card Making",dur:15,cat:"anki",desc:"Sticky notes from both reading blocks to Anki cards. Cap: 12 cards, one fact per card. 15 min is exactly enough.",sync:2},
{id:"r7",time:"10:25 AM",block:"Topic Module + Full Check",dur:55,cat:"mcq",desc:"ONE BLOCK. First 20 min: 20-25 Qs on today's topic. Then immediately 35 min checking every answer. Wrong = gap + notes + Anki card. PYQ starts 11:20 regardless.",sync:2},
{id:"r8",time:"11:20 AM",block:"PYQ Block",dur:65,cat:"mcq",desc:"PROTECTED. Marrow PYQs for today's subject or rotation. 35-40 Qs. Skim known, full read for new failures. Finish early = stop early.",sync:2},
{id:"r9",time:"12:25 PM",block:"Lunch",dur:30,cat:"brk",desc:"Away from desk. Sit and eat. Lighter carbs, more protein. Postprandial dip proportional to carb load.",sync:2},
{id:"r10",time:"12:55 PM",block:"Post-Meal Walk",dur:10,cat:"health",desc:"10 min walking immediately after eating. Blood glucose management. Even around the house counts.",sync:2},
{id:"r11",time:"1:05 PM",block:"Rest Window",dur:30,cat:"brk",desc:"Horizontal rest. No screen. Eyes closed, alarm set. Morning content consolidates here. Not optional.",sync:2},
{id:"r12",time:"1:35 PM",block:"Anki Review Batch",dur:55,cat:"anki",desc:"Due cards all subjects. Cap: 100 cards or 55 min. Ends 2:30 PM clean. Suspend 3x Good/Easy cards.",sync:2},
{id:"r13",time:"2:30 PM",block:"Main Module + Full Check",dur:95,cat:"mcq",desc:"ONE BLOCK. First 50 min: 50 Qs mixed subjects, exam conditions. Then 45 min full check. Wrong = gap + notes + Anki card."},
{id:"r14",time:"4:05 PM",block:"Tomorrow Plan + Pre-Gym",dur:20,cat:"routine",desc:"Write tomorrow's plan on paper (10 min). Subject, chapters, PYQ module, custom module filter. Pack gym bag."},
{id:"r15",time:"4:25 PM",block:"LEISURE",dur:155,cat:"leisure",desc:"2h 35min. Series, reels, friends, cook, walk, nap. Guilt-free. The structural reason the late-night scroll stops."},
{id:"r16",time:"7:00 PM",block:"GYM",dur:90,cat:"health",desc:"1.5 hours. Full workout. Non-negotiable. BDNF improves Final Anki retention. Go even on flat days.",sync:3},

    h+='<div class="st-cd"><div class="st-lbl">Devices</div><div class="st-desc">With Firebase, all sync in real-time.</div>';
    h+='<div class="dtags"><span class="dtag">OnePlus Pad 3</span><span class="dtag">Nord CE 5</span><span class="dtag">Pixel 7</span><span class="dtag">iPad 9th Gen</span></div></div>';
    h+='<div class="st-cd"><div class="st-lbl">Reset Progress</div><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">';
    h+='<button class="dbtn" onclick="rp(\''+S.p+"')\">"+(isR?"Rutik":"Vaishnavi")+'</button><button class="dbtn" onclick="rp(\'both\')">Both</button></div></div>';
    h+='<div class="st-cd"><div class="st-lbl">Home Screen</div><div class="st-desc"><b style="color:var(--t2)">Android:</b> Chrome \u2192 \u22EE \u2192 Add to Home screen<br><b style="color:var(--t2)">iPad:</b> Safari \u2192 Share \u2192 Add to Home Screen</div></div>';
    h+='<div style="text-align:center;padding:24px;color:var(--t4);font-size:10px;line-height:1.8">StudySync v4.0<br>Rutik & Vaishnavi \u{1F49C}<br>NEET PG 2026</div></div>';
  }
  // EDIT MODAL
  if(S.editModal){
    var et=null;var base=S.p==="rutik"?RUTIK_BASE:VAISH_BASE;
    for(var i=0;i<base.length;i++){if(base[i].id===S.editModal)et=base[i]}
    if(et){
      var edits=S.edits[S.p]||{};var cur=edits[et.id]||{};
      h+='<div class="emod" onclick="closeEdit()"><div class="emod-box" onclick="event.stopPropagation()">';
      h+='<div class="emod-title"><span>Edit: '+et.block+'</span><button class="emod-close" onclick="closeEdit()">\u2715</button></div>';
      h+='<div class="emod-field"><div class="emod-label">Block Name</div><input class="emod-inp" id="ed-name" value="'+(cur.block||et.block)+'"></div>';
      h+='<div class="emod-field"><div class="emod-label">Time (e.g. 7:30 AM)</div><input class="emod-inp" id="ed-time" value="'+(cur.time||et.time)+'"></div>';
      h+='<div class="emod-field"><div class="emod-label">Duration (minutes)</div><input class="emod-inp" type="number" id="ed-dur" value="'+(cur.dur!==undefined?cur.dur:et.dur)+'"></div>';
      h+='<div class="emod-field"><div class="emod-label">Description</div><input class="emod-inp" id="ed-desc" value="'+(cur.desc||et.desc)+'"></div>';
      h+='<button class="emod-save" onclick="saveEdit(\''+et.id+"')\">Save Changes</button>";
      var hasEdits=!!cur.block||!!cur.time||cur.dur!==undefined||!!cur.desc;
      if(hasEdits)h+='<button style="width:100%;padding:12px;margin-top:8px;border-radius:var(--rad-s);font-size:13px;font-weight:600;color:var(--red);background:rgba(252,92,101,0.06);border:1px solid rgba(252,92,101,0.15)" onclick="resetEdit(\''+et.id+"')\">Reset to Default</button>";
      h+="</div></div>";
    }
  }
  // FOCUS MODE
  if(S.foc){var ft=null;for(var i=0;i<sc.length;i++){if(sc[i].id===S.foc)ft=sc[i]}
    if(ft){var ar2=actRem(ft,at);var fc=CATS[ft.cat];
      h+='<div class="focus vis"><div class="f-lbl">Focus Mode</div>';
      h+='<div class="f-nm" style="color:'+fc.c+'">'+fc.i+" "+ft.block+"</div>";
      h+='<div class="f-desc">'+ft.desc+"</div>";
      h+='<div class="f-timer" id="ftimer" style="color:'+fc.c+'">'+(ar2.rem>0?fm(ar2.rem):"Done!")+"</div>";
      h+='<div class="f-sub">'+(ar2.rem>0?"remaining":"Time is up!")+"</div>";
      h+='<div class="f-bar"><div class="f-bar-f" style="width:'+ar2.pct+"%;background:"+fc.c+'"></div></div>';
      h+='<button class="f-exit" onclick="cfoc()">\u2190 Back</button></div>';
    }}
  h+='<div class="bspace"></div>';
  document.getElementById("app").innerHTML=h;
}
// ACTIONS
window.sp=function(p){S.p=p;save();render()};
window.sv=function(v){S.v=v;render()};
window.tg=function(id){if(!S.data[S.p])S.data[S.p]={};if(!S.data[S.p][id])S.data[S.p][id]={};S.data[S.p][id].done=!S.data[S.p][id].done;saveHistory();save();render()};
window.sa=function(id,val){if(!S.data[S.p])S.data[S.p]={};if(!S.data[S.p][id])S.data[S.p][id]={};S.data[S.p][id].actualMin=parseInt(val)||0;save()};
window.te=function(id){expanded[id]=!expanded[id];render()};
window.tta=function(){S.ta=!S.ta;save();render()};
window.tse=function(){S.showEditor=!S.showEditor;save();render()};
window.scal=function(){var inp=document.getElementById("calinp");if(inp)S.cal=inp.value.trim();save();render()};
window.sfb=function(){var inp=document.getElementById("fbinp");if(inp){S.fbCfg=inp.value.trim();save();if(typeof firebase==="undefined"){alert("Firebase SDK loading. Wait a few seconds and tap again.")}else{fbInit()}}};
window.rp=function(w){if(confirm("Reset "+(w==="both"?"both":w)+"?")){if(w==="both")S.data={rutik:{},vaishnavi:{}};else S.data[w]={};save();render()}};
window.ofoc=function(id){S.foc=id;render()};
window.cfoc=function(){S.foc=null;render()};
window.openEdit=function(id){S.editModal=id;render()};
window.closeEdit=function(){S.editModal=null;render()};
window.saveEdit=function(id){
  var nm=document.getElementById("ed-name").value.trim();
  var tm=document.getElementById("ed-time").value.trim();
  var dr=parseInt(document.getElementById("ed-dur").value);
  var ds=document.getElementById("ed-desc").value.trim();
  if(!S.edits[S.p])S.edits[S.p]={};
  S.edits[S.p][id]={block:nm,time:tm,dur:isNaN(dr)?0:dr,desc:ds};
  S.editModal=null;save();render();
};
window.resetEdit=function(id){
  if(S.edits[S.p]&&S.edits[S.p][id]){delete S.edits[S.p][id]}
  S.editModal=null;save();render();
};
window.saveNote=function(val){S.notes[TODAY+"_"+S.p]=val;save()};
window.sendLove=function(){
  var inp=document.getElementById("loveinp");if(!inp||!inp.value.trim())return;
  if(!S.loveNotes)S.loveNotes=[];
  var now=new Date();var timeStr=now.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  S.loveNotes.push({from:S.p,text:inp.value.trim(),time:timeStr,ts:Date.now()});
  if(S.loveNotes.length>50)S.loveNotes=S.loveNotes.slice(-50);
  save();render();
};
// CLOCK
function tick(){
  var el=document.getElementById("clk");
  if(el){var c=gc();el.innerHTML=c.h+":"+c.m+'<span class="clock-sec">:'+c.s+'</span> <span class="clock-per">'+c.p+"</span>"}
  var cd=document.getElementById("cd");
  if(cd){var sc2=sched();var d2=pd();var at2=S.ta?adjT(sc2,d2):null;var act2=actTask(sc2,at2);if(act2){var ar3=actRem(act2,at2);cd.textContent=ar3.rem>0?fm(ar3.rem):"Done"}}
  var ft2=document.getElementById("ftimer");
  if(ft2&&S.foc){var sc3=sched();var d3=pd();var at3=S.ta?adjT(sc3,d3):null;var ft3=null;for(var i=0;i<sc3.length;i++){if(sc3[i].id===S.foc)ft3=sc3[i]}if(ft3){var ar4=actRem(ft3,at3);ft2.textContent=ar4.rem>0?fm(ar4.rem):"Done!"}}
}
setInterval(tick,1000);
setInterval(function(){if(!S.foc&&!S.editModal)render()},60000);
// FIREBASE SDK
(function(){var s1=document.createElement("script");s1.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";s1.onload=function(){var s2=document.createElement("script");s2.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";s2.onload=function(){fbInit()};document.head.appendChild(s2)};document.head.appendChild(s1)})();
render();
</script>
</body>
</html>
