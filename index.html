<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06080e">
<meta name="mobile-web-app-capable" content="yes">
<title>StudySync</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#06080e;--bg2:#0c0f18;--bg3:#121620;
--s1:rgba(255,255,255,0.04);--s2:rgba(255,255,255,0.065);--s3:rgba(255,255,255,0.1);
--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);
--t1:#f0f2f5;--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.28);--t4:rgba(255,255,255,0.14);
--r:#36d7b7;--r2:rgba(54,215,183,0.1);--r3:rgba(54,215,183,0.22);
--v:#e879a8;--v2:rgba(232,121,168,0.1);--v3:rgba(232,121,168,0.22);
--accent:var(--r);--abg:var(--r2);--abr:var(--r3);
--study:#36d7b7;--anki:#b794f6;--mcq:#f6ad55;--health:#68d391;
--routine:#a0aec0;--brk:#f6e05e;--leisure:#f687b3;--work:#63b3ed;--sleep:#7f9cf5;
--red:#fc5c65;--green:#26de81;
--font:'Outfit',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
--rad:16px;--rad-s:10px;
--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
--nav-h:58px;
--gold:#f6e05e;--diamond:#63b3ed;
}
html{background:var(--bg)}
body{font-family:var(--font);color:var(--t1);background:var(--bg);max-width:520px;margin:0 auto;
min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;
padding-top:var(--safe-t);padding-bottom:calc(var(--nav-h) + var(--safe-b) + 12px)}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
input,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;padding:12px 16px 10px;
background:linear-gradient(180deg,var(--bg) 75%,transparent);
backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-left{flex:1}
.hdr-date{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:600}
.hdr-name{font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;margin-top:2px;line-height:1.1}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-gear{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
background:var(--s1);border:1px solid var(--b1);font-size:15px;transition:all 0.2s}
.hdr-gear:active{transform:scale(0.92)}
.clock-time{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--t1);letter-spacing:-1.5px;line-height:1;text-align:right}
.clock-sec{font-size:11px;color:var(--t4);font-weight:400}
.clock-per{font-size:9px;color:var(--t3);margin-left:1px;font-weight:500}
.sync-badge{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:4px}
.sync-badge span{font-size:8px;color:var(--t4)}

/* ── PERSON SWITCHER ─────────────────────────────────── */
.psw{display:flex;background:var(--s1);border-radius:14px;padding:3px;position:relative;overflow:hidden}
.psw-btn{flex:1;padding:10px 0;border-radius:11px;font-size:13px;font-weight:700;position:relative;
z-index:2;text-align:center;transition:color 0.3s;letter-spacing:0.2px}
.psw-bg{position:absolute;top:3px;height:calc(100% - 6px);width:calc(50% - 3px);border-radius:11px;
transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);z-index:1}

/* ── BOTTOM NAV ──────────────────────────────────────── */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
z-index:100;display:flex;align-items:stretch;
padding:6px 10px calc(6px + var(--safe-b));
background:rgba(6,8,14,0.94);
backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
border-top:1px solid var(--b1)}
.nav-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:3px;padding:5px 2px;border-radius:12px;
font-size:8px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;
transition:all 0.2s;-webkit-tap-highlight-color:transparent;position:relative}
.nav-b .nav-i{font-size:17px;line-height:1;transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.nav-b.on{color:var(--accent);background:var(--abg)}
.nav-b.on .nav-i{transform:scale(1.15)}
.nav-b:not(.on){color:var(--t4)}

/* ── CURRENT BLOCK ───────────────────────────────────── */
.cur{margin:8px 16px 6px;padding:16px 18px;border-radius:var(--rad);
background:var(--s1);border:1px solid var(--b1);position:relative;overflow:hidden;cursor:pointer;
transition:transform 0.15s,box-shadow 0.3s}
.cur:active{transform:scale(0.985)}
.cur::before{content:'';position:absolute;inset:0 0 auto 0;height:1px;
background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5}
.cur-glow{position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;
filter:blur(50px);opacity:0.1;pointer-events:none}
.cur-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.cur-top{display:flex;align-items:center;gap:12px}
.cur-info{flex:1;min-width:0}
.cur-lbl{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:2.5px;font-weight:700}
.cur-name{font-size:15px;font-weight:700;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cur-cd{font-family:var(--mono);font-size:28px;font-weight:600;flex-shrink:0;letter-spacing:-1.5px;line-height:1}
.cur-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:13px;overflow:hidden}
.cur-bar-fill{height:100%;border-radius:2px;transition:width 1s linear}

/* ── QUICK STATS ────────────────────────────────────── */
.qs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 16px 10px}
.q{padding:14px;border-radius:14px;background:var(--s1);border:1px solid var(--b1);position:relative;overflow:hidden}
.q::after{content:'';position:absolute;inset:0;border-radius:14px;opacity:0;transition:opacity 0.3s}
.q-l{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.q-v{font-family:var(--mono);font-size:22px;font-weight:600;margin-top:4px;line-height:1.1}
.q-sub{font-size:9px;color:var(--t4);margin-top:2px}

/* ── PROGRESS RING (Today tab) ──────────────────────── */
.ring-wrap{text-align:center;padding:4px 16px 0}
.ring-svg{width:100px;height:100px}
.ring-bg{fill:none;stroke:var(--s2);stroke-width:5}
.ring-fg{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.8s ease}
.ring-pct{font-family:var(--mono);font-size:22px;font-weight:700;fill:var(--accent)}
.ring-lbl{font-size:8px;fill:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700}

/* ── GROUP HEADERS ───────────────────────────────────── */
.tg{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--t4);
padding:16px 16px 7px;display:flex;align-items:center;gap:10px}
.tg::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ── TASK ROWS ───────────────────────────────────────── */
.tk{padding:11px 16px 11px 12px;border-bottom:1px solid rgba(255,255,255,0.025);
border-left:2.5px solid transparent;transition:all 0.2s}
.tk.act{background:rgba(246,224,94,0.02);border-left-color:rgba(246,224,94,0.45)}
.tk.dn{opacity:0.45}
.tk-main{display:flex;align-items:flex-start;gap:10px}
.cb{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--b2);
display:flex;align-items:center;justify-content:center;margin-top:2px;
transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1)}
.cb.on{animation:popCb 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.cb .ck{font-size:10px;font-weight:800;opacity:0;transition:opacity 0.15s;color:var(--bg)}
.cb.on .ck{opacity:1}
@keyframes popCb{0%{transform:scale(0.6)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
.tk-c{flex:1;min-width:0}
.tk-r1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tk-time{font-family:var(--mono);font-size:10.5px;color:var(--t4);min-width:60px;font-weight:400}
.tk.act .tk-time{color:#f6e05e}
.tk-nm{font-size:14px;font-weight:600;transition:all 0.2s;line-height:1.25}
.tk.dn .tk-nm{text-decoration:line-through;color:var(--t3)}
.tk-r2{display:flex;gap:5px;margin-top:5px;align-items:center;flex-wrap:wrap}
.tk-cat{font-size:7.5px;padding:2.5px 8px;border-radius:20px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.tk-dur{font-size:10px;color:var(--t4)}
.tk-ov{font-size:9px;color:var(--red);font-weight:700;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.tk-exp{color:var(--t4);font-size:9px;padding:4px;transition:transform 0.25s;flex-shrink:0}
.tk-exp.op{transform:rotate(180deg)}
.tk-det{max-height:0;overflow:hidden;transition:max-height 0.35s ease;padding:0 0 0 34px}
.tk-det.op{max-height:280px;padding:10px 0 4px 34px}
.tk-desc{font-size:12px;color:var(--t2);line-height:1.65}
.act-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.act-lbl{font-size:11px;color:var(--t3)}
.act-inp{width:54px;padding:5px 6px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);
font-family:var(--mono);font-size:13px;text-align:center;outline:none}
.act-inp:focus{border-color:var(--accent)}

/* ── SECTIONS ────────────────────────────────────────── */
.sec{padding:16px}
.sec-t{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.scards{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.sc{flex:1 1 130px;min-width:115px;padding:14px;border-radius:var(--rad);background:var(--s1);border:1px solid var(--b1);position:relative;overflow:hidden}
.sc-l{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.sc-v{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:5px}
.sc-s{font-size:10px;color:var(--t4);margin-top:3px}
.sub-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sub-t::after{content:'';flex:1;height:1px;background:var(--b1)}
.cr{display:flex;align-items:center;gap:10px;padding:5px 0}
.cr-i{font-size:13px;width:18px;text-align:center}
.cr-l{font-size:11px;color:var(--t2);width:50px}
.cr-bt{flex:1;height:4px;background:var(--s1);border-radius:3px;overflow:hidden}
.cr-bf{height:100%;border-radius:3px;transition:width 0.5s ease}
.cr-c{font-family:var(--mono);font-size:10px;color:var(--t4);min-width:36px;text-align:right}
.td{display:flex;height:24px;border-radius:8px;overflow:hidden;background:var(--s1);margin-bottom:8px}
.td-s{display:flex;align-items:center;justify-content:center;font-size:9px;transition:width 0.4s}
.td-lg{display:flex;flex-wrap:wrap;gap:8px}
.td-lg span{font-size:9px;color:var(--t3);display:flex;align-items:center;gap:4px}
.td-lg .dt{width:7px;height:7px;border-radius:2px;display:inline-block}

/* ── LEADERBOARD ─────────────────────────────────────── */
.lb-cds{display:flex;gap:10px;margin-bottom:16px}
.lb-cd{flex:1;padding:18px 14px;border-radius:var(--rad);text-align:center;border:1px solid var(--b1);background:var(--s1);position:relative;overflow:hidden;transition:transform 0.2s}
.lb-cd.win{border-color:rgba(246,224,94,0.2);background:rgba(246,224,94,0.03)}
.lb-cd.win::before{content:'👑';position:absolute;top:6px;right:8px;font-size:14px;animation:crownBob 2s ease-in-out infinite}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-3px) rotate(5deg)}}
.lb-nm{font-size:13px;font-weight:700;margin-bottom:8px}
.lb-pc{font-family:var(--mono);font-size:32px;font-weight:600}
.lb-sb{font-size:10px;color:var(--t3);margin-top:4px}
.lb-comp{background:var(--s1);border-radius:var(--rad);padding:16px;border:1px solid var(--b1);margin-bottom:10px}
.lb-ct{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px}
.lb-row{margin-bottom:8px}
.lb-rt{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.lb-bt{height:6px;background:var(--s2);border-radius:4px;overflow:hidden}
.lb-bf{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.lb-mot{text-align:center;padding:24px 16px;border-radius:var(--rad);background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid var(--b1)}

/* ── HEATMAP ─────────────────────────────────────────── */
.hm-cell{width:14px;height:14px;border-radius:3px;transition:background 0.2s}
.hm-legend{display:flex;align-items:center;gap:3px;justify-content:flex-end;margin-top:4px}
.hm-legend span{font-size:8px;color:var(--t4)}
.hm-legend .hm-lc{width:10px;height:10px;border-radius:2px}

/* ── WEEKLY VISUAL ──────────────────────────────────── */
.wk{background:var(--s1);border-radius:var(--rad);border:1px solid var(--b1);overflow:hidden;margin-bottom:14px}
.wk-hdr{display:flex;padding:10px 12px;border-bottom:1px solid var(--b1);gap:4px}
.wk-hdr span{flex:1;text-align:center;font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:4px 0}
.wk-hdr span.today{color:var(--accent);background:var(--abg);border-radius:6px}
.wk-body{display:flex;padding:8px 12px 12px;gap:4px;min-height:140px}
.wk-col{flex:1;display:flex;flex-direction:column;gap:2px}
.wk-blk{border-radius:3px;min-height:3px}

/* ── CALENDAR ────────────────────────────────────────── */
.cal-card{background:var(--s1);border-radius:var(--rad);padding:16px;border:1px solid var(--b1);margin-bottom:12px}
.cal-tt{font-size:14px;font-weight:700;margin-bottom:8px}
.cal-desc{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:10px}
.cal-inp{width:100%;padding:11px 14px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none}
.cal-inp:focus{border-color:var(--accent)}
.cal-inp::placeholder{color:var(--t4)}
.cal-btn{margin-top:8px;padding:11px 0;border-radius:var(--rad-s);font-size:13px;font-weight:600;background:var(--abg);color:var(--accent);border:1px solid var(--abr);width:100%;transition:transform 0.1s}
.cal-btn:active{transform:scale(0.98)}
.cal-iframe{border-radius:12px;overflow:hidden;border:1px solid var(--b1);margin-top:12px}
.cal-iframe iframe{width:100%;height:420px;border:none}

/* ── SETTINGS PANEL ──────────────────────────────────── */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
.settings-overlay.open{opacity:1;pointer-events:all}
.settings-panel{position:fixed;top:0;right:-320px;bottom:0;width:300px;max-width:85vw;background:var(--bg2);
z-index:201;overflow-y:auto;padding:20px 16px calc(20px + var(--safe-b));
transition:right 0.35s cubic-bezier(0.4,0,0.2,1);border-left:1px solid var(--b1)}
.settings-panel.open{right:0}
.sp-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.sp-close{font-size:20px;color:var(--t3);padding:4px 8px;border-radius:8px;background:var(--s1)}
.st-cd{background:var(--s1);border-radius:var(--rad);padding:14px;border:1px solid var(--b1);margin-bottom:10px}
.st-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.st-lbl{font-size:13px;font-weight:600}
.st-desc{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.6}
.tgl{width:44px;height:24px;border-radius:12px;flex-shrink:0;position:relative;transition:background 0.3s}
.tgl.off{background:rgba(255,255,255,0.1)}
.tgl.on{background:var(--accent)}
.tgl-k{width:18px;height:18px;border-radius:9px;background:#fff;position:absolute;top:3px;transition:left 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.tgl.off .tgl-k{left:3px}
.tgl.on .tgl-k{left:23px}
.dtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.dtag{font-size:9px;padding:4px 10px;border-radius:20px;background:var(--s2);color:var(--t2);font-weight:500}
.dbtn{padding:10px 18px;border-radius:var(--rad-s);font-size:12px;font-weight:600;border:1px solid rgba(252,92,101,0.2);background:rgba(252,92,101,0.06);color:var(--red);transition:transform 0.1s}
.dbtn:active{transform:scale(0.97)}
.sync-dot{width:6px;height:6px;border-radius:3px;display:inline-block}
.sync-dot.on{background:var(--green);animation:pulse 2s infinite}
.sync-dot.off{background:var(--t4)}
.fb-input{width:100%;padding:10px 12px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--bg);font-family:var(--mono);font-size:10px;outline:none;resize:vertical;min-height:70px;color:var(--t1)}
.fb-input:focus{border-color:var(--accent)}
.fb-btn{margin-top:8px;padding:10px 0;border-radius:var(--rad-s);font-size:12px;font-weight:600;background:var(--abg);color:var(--accent);border:1px solid var(--abr);width:100%;transition:transform 0.1s}
.fb-btn:active{transform:scale(0.98)}

/* ── FOCUS MODE ──────────────────────────────────────── */
.focus{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:opacity 0.35s;opacity:0;pointer-events:none}
.focus.vis{opacity:1;pointer-events:all}
.f-lbl{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:14px}
.f-nm{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.f-desc{font-size:12px;color:var(--t2);text-align:center;max-width:280px;line-height:1.6;margin-bottom:36px}
.f-timer{font-family:var(--mono);font-size:72px;font-weight:600;letter-spacing:-3px}
.f-sub{font-size:11px;color:var(--t4);margin-top:4px;margin-bottom:36px}
.f-bar{width:220px;height:3px;background:var(--s1);border-radius:2px;margin-bottom:40px;overflow:hidden}
.f-bar-f{height:100%;border-radius:2px;transition:width 1s linear}
.f-exit{padding:14px 36px;border-radius:14px;background:var(--s1);border:1px solid var(--b1);font-size:14px;font-weight:600;color:var(--t2);transition:transform 0.1s}
.f-exit:active{transform:scale(0.97)}

/* ── EDIT MODAL ──────────────────────────────────────── */
.emod{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:998;display:flex;align-items:flex-end;justify-content:center;padding:0}
.emod-box{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;padding:20px 16px calc(20px + var(--safe-b))}
.emod-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.emod-close{font-size:20px;color:var(--t3);padding:4px 8px}
.emod-field{margin-bottom:12px}
.emod-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
.emod-inp{width:100%;padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:14px;outline:none;color:var(--t1)}
.emod-inp:focus{border-color:var(--accent)}
.emod-save{width:100%;padding:13px;border-radius:var(--rad-s);font-size:14px;font-weight:700;background:var(--accent);color:var(--bg);border:none;margin-top:8px;transition:transform 0.1s}
.emod-save:active{transform:scale(0.98)}
.note-area{width:100%;padding:10px 14px;border-radius:var(--rad-s);border:1px solid var(--b1);background:var(--s1);font-size:13px;outline:none;color:var(--t1);resize:vertical;min-height:60px;line-height:1.6}
.note-area:focus{border-color:var(--accent)}

/* ── EXAM COUNTDOWN ──────────────────────────────────── */
.exam-cd{text-align:center;padding:18px 16px;border-radius:var(--rad);
background:linear-gradient(135deg,var(--r2),var(--v2));border:1px solid var(--b1);margin-top:12px;position:relative;overflow:hidden}
.exam-cd::before{content:'';position:absolute;inset:0;
background:radial-gradient(ellipse at 30% 20%,rgba(54,215,183,0.08),transparent 60%);pointer-events:none}

/* ── XP TOAST ────────────────────────────────────────── */
.xp-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
padding:8px 18px;border-radius:30px;font-family:var(--mono);font-size:13px;font-weight:700;
z-index:300;opacity:0;pointer-events:none;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
background:rgba(246,224,94,0.15);border:1px solid rgba(246,224,94,0.3);color:#f6e05e;
backdrop-filter:blur(20px)}
.xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────── */
.anim{animation:fadeUp 0.35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bspace{height:10px}

/* ── ENERGY/BRAIN TOOLS IN STATS ─────────────────────── */
.energy-bar{display:flex;gap:3px;margin-top:10px}
.energy-btn{flex:1;height:30px;border-radius:7px;font-size:10px;font-weight:700;transition:all 0.15s;border:1px solid var(--b1);background:var(--s1);color:var(--t4)}
.energy-btn:active{transform:scale(0.92)}
.energy-btn.on{color:var(--bg);font-weight:800}
.brain-btn{padding:8px 12px;border-radius:10px;font-size:11px;font-weight:600;transition:all 0.15s;background:var(--s1);border:1px solid var(--b1);color:var(--t3)}
.brain-btn:active{transform:scale(0.95)}
.brain-btn.on{color:var(--bg)}

/* ── MOTIVATIONAL QUOTE ──────────────────────────────── */
.motiv{padding:6px 20px 2px;font-size:11px;color:var(--t4);font-style:italic;text-align:center;line-height:1.5;opacity:0.7}
</style>

// ── UTILITIES ────────────────────────────────────────────────────────────────
function pt(t){var p=t.split(" ");var hm=p[0].split(":");var h=parseInt(hm[0]);var m=parseInt(hm[1]);if(p[1]==="PM"&&h!==12)h+=12;if(p[1]==="AM"&&h===12)h=0;return h*60+m}
function nm(){var n=new Date();return n.getHours()*60+n.getMinutes()}
function fm(m){if(m<=0)return"0m";var h=Math.floor(m/60);var mn=m%60;if(h===0)return mn+"m";if(mn===0)return h+"h";return h+"h "+mn+"m"}
function mt(m){var h=Math.floor(m/60)%24;var mn=m%60;var p=h>=12?"PM":"AM";h=h%12||12;return h+":"+String(mn).padStart(2,"0")+" "+p}
function dk(){return new Date().toISOString().split("T")[0]}
function gc(){var n=new Date();var h=n.getHours();var m=n.getMinutes();var s=n.getSeconds();var p=h>=12?"PM":"AM";h=h%12||12;return{h:h,m:String(m).padStart(2,"0"),s:String(s).padStart(2,"0"),p:p}}
function dkOff(days){var d=new Date();d.setDate(d.getDate()+days);return d.toISOString().split("T")[0]}

// ── STATE ────────────────────────────────────────────────────────────────────
var S={p:"rutik",v:"schedule",ta:false,cal:"",foc:null,data:{rutik:{},vaishnavi:{}},fbCfg:"",
  history:{},edits:{rutik:{},vaishnavi:{}},notes:{},editModal:null,showEditor:false,loveNotes:[],

// ── SCHEDULE HELPERS ─────────────────────────────────────────────────────────
function getSched(who){
  var base=who==="rutik"?RUTIK_BASE:VAISH_BASE;
  var edits=S.edits[who]||{};
  return base.map(function(t){
    var e=edits[t.id];if(!e)return t;
    return{id:t.id,time:e.time||t.time,block:e.block||t.block,dur:e.dur!==undefined?e.dur:t.dur,cat:e.cat||t.cat,desc:e.desc||t.desc,sync:t.sync};
  });
}
function load(){try{var x=localStorage.getItem("ss3_s");if(x){var o=JSON.parse(x);S.ta=!!o.ta;S.cal=o.cal||"";S.p=o.p||"rutik";S.fbCfg=o.fbCfg||"";S.showEditor=!!o.showEditor;if(o.schedVer!=="v4"){S.edits={rutik:{},vaishnavi:{}};console.log("Schedule V4: cleared old edits")}}var d=localStorage.getItem("ss3_d_"+TODAY);if(d)S.data=JSON.parse(d);var h=localStorage.getItem("ss3_hist");if(h)S.history=JSON.parse(h);var e=localStorage.getItem("ss3_edits");if(e)S.edits=JSON.parse(e);var n=localStorage.getItem("ss3_notes");if(n)S.notes=JSON.parse(n);var l=localStorage.getItem("ss3_love");if(l)S.loveNotes=JSON.parse(l);var tk=localStorage.getItem("ss3_tracker");if(tk){var tp=JSON.parse(tk);S.tracker.energy=tp.energy||{};S.tracker.brain=tp.brain||{};S.tracker.gt=tp.gt||[]}}catch(e){}}
function save(){try{localStorage.setItem("ss3_s",JSON.stringify({ta:S.ta,cal:S.cal,p:S.p,fbCfg:S.fbCfg,showEditor:S.showEditor,schedVer:"v4"}));localStorage.setItem("ss3_d_"+TODAY,JSON.stringify(S.data));localStorage.setItem("ss3_hist",JSON.stringify(S.history));localStorage.setItem("ss3_edits",JSON.stringify(S.edits));localStorage.setItem("ss3_notes",JSON.stringify(S.notes));localStorage.setItem("ss3_love",JSON.stringify(S.loveNotes));localStorage.setItem("ss3_tracker",JSON.stringify(S.tracker));fbPush()}catch(e){}}
load();

// ── FIREBASE ─────────────────────────────────────────────────────────────────
function parseFbCfg(raw){
  raw=raw.trim();if(raw.charAt(0)!=="{")raw="{"+raw+"}";
  raw=raw.replace(/([\{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g,'$1"$2":');
  raw=raw.replace(/,\s*}/g,"}");return JSON.parse(raw);
}
function fbInit(){
  try{if(!S.fbCfg)return;var cfg=parseFbCfg(S.fbCfg);
    if(!cfg.databaseURL){alert("databaseURL missing. Enable Realtime Database in Firebase console.");return}
    if(typeof firebase==="undefined")return;
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    fbDb=firebase.database();
    fbRef=fbDb.ref("studysync/days/"+TODAY);
    fbHistRef=fbDb.ref("studysync/history");
    fbEditsRef=fbDb.ref("studysync/edits");
    fbNotesRef=fbDb.ref("studysync/notes");
    var fbLoveRef=fbDb.ref("studysync/love");
    fbRef.on("value",function(snap){var v=snap.val();if(v){S.data=v;try{localStorage.setItem("ss3_d_"+TODAY,JSON.stringify(S.data))}catch(e){}render()}});
    fbHistRef.on("value",function(snap){var v=snap.val();if(v){S.history=v;try{localStorage.setItem("ss3_hist",JSON.stringify(S.history))}catch(e){}render()}});
    fbEditsRef.on("value",function(snap){var v=snap.val();if(v){S.edits=v;try{localStorage.setItem("ss3_edits",JSON.stringify(S.edits))}catch(e){}render()}});
    fbNotesRef.on("value",function(snap){var v=snap.val();if(v){S.notes=v;try{localStorage.setItem("ss3_notes",JSON.stringify(S.notes))}catch(e){}render()}});
    fbLoveRef.on("value",function(snap){var v=snap.val();if(v){S.loveNotes=v;try{localStorage.setItem("ss3_love",JSON.stringify(S.loveNotes))}catch(e){}render()}});
    var fbTrackerRef=fbDb.ref("studysync/tracker");
    fbTrackerRef.on("value",function(snap){var v=snap.val();if(v){S.tracker.energy=v.energy||{};S.tracker.brain=v.brain||{};S.tracker.gt=v.gt||[];try{localStorage.setItem("ss3_tracker",JSON.stringify(S.tracker))}catch(e){}render()}});
    window._fbLoveRef=fbLoveRef;window._fbTrackerRef=fbTrackerRef;
    alert("Firebase connected!");render();
  }catch(e){alert("Firebase error: "+e.message)}
}
function fbPush(){
  if(fbRef)try{fbRef.set(S.data)}catch(e){}
  if(fbHistRef)try{fbHistRef.set(S.history)}catch(e){}
  if(fbEditsRef&&S.edits)try{fbEditsRef.set(S.edits)}catch(e){}
  if(fbNotesRef&&S.notes)try{fbNotesRef.set(S.notes)}catch(e){}
  if(window._fbLoveRef)try{window._fbLoveRef.set(S.loveNotes)}catch(e){}
  if(window._fbTrackerRef)try{window._fbTrackerRef.set(S.tracker)}catch(e){}
}

// ── COMPUTED ─────────────────────────────────────────────────────────────────
function sched(){return getSched(S.p)}
function pd(){return S.data[S.p]||{}}
function adjT(sc,d){var t={};var dl=0;for(var i=0;i<sc.length;i++){t[sc[i].id]=pt(sc[i].time)+dl;var a=d[sc[i].id]?d[sc[i].id].actualMin:0;if(a&&a!==sc[i].dur)dl+=(a-sc[i].dur)}return t}
function actTask(sc,at){var n=nm();for(var i=sc.length-1;i>=0;i--){var s=at?at[sc[i].id]:pt(sc[i].time);if(n>=s)return sc[i]}return null}
function actRem(task,at){if(!task||task.dur===0)return{rem:0,pct:0};var s=at?at[task.id]:pt(task.time);var n=nm();return{rem:Math.max(0,s+task.dur-n),pct:Math.max(0,Math.min(100,((n-s)/task.dur)*100))}}
function calcPct(who){
  var sc=getSched(who);var d=(S.data[who])||{};
  var done=0;for(var i=0;i<sc.length;i++){if(d[sc[i].id]&&d[sc[i].id].done)done++}
  return Math.round((done/sc.length)*100);
}
function saveHistory(){
  if(!S.history.rutik)S.history.rutik={};
  if(!S.history.vaishnavi)S.history.vaishnavi={};
  S.history.rutik[TODAY]=calcPct("rutik");
  S.history.vaishnavi[TODAY]=calcPct("vaishnavi");
}
function getStreak(who){
  var hist=S.history[who]||{};var streak=0;
  for(var i=0;i<365;i++){
    var key=dkOff(-i);var val=hist[key];
    if(val===undefined){if(i===0)continue;break;}
    if(val>=70)streak++;else if(i>0)break;
  }
  return streak;
}
function getXP(who){
  var sc=getSched(who);var d=S.data[who]||{};var xp=0;
  for(var i=0;i<sc.length;i++){if(d[sc[i].id]&&d[sc[i].id].done)xp+=(XP_MAP[sc[i].cat]||3)}
  xp+=getStreak(who)*5;return xp;
}
var LEVELS=[{n:"Intern",xp:0,e:"\uD83E\uDE7A"},{n:"Resident",xp:50,e:"\uD83C\uDFE5"},{n:"Registrar",xp:100,e:"\uD83D\uDCCB"},{n:"Consultant",xp:150,e:"\uD83D\uDC68\u200D\u2695\uFE0F"},{n:"Professor",xp:200,e:"\uD83C\uDF93"},{n:"Legend",xp:250,e:"\uD83D\uDC51"}];
function getLevel(xp){for(var i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp)return LEVELS[i]}return LEVELS[0]}
function hmColor(pct,who){
  var base=who==="rutik"?"54,215,183":"232,121,168";
  if(pct===undefined||pct===null)return"rgba(255,255,255,0.03)";
  if(pct===0)return"rgba(255,255,255,0.03)";

  h+='<div class="st-desc" style="font-size:10px;margin:0 0 6px;line-height:1.7">1. console.firebase.google.com \u2192 Create project<br>2. Realtime Database \u2192 Test mode<br>3. Web app \u2192 Register \u2192 Copy config<br>4. Paste below</div>';
  h+='<textarea class="fb-input" id="fbinp" placeholder="Paste config...">'+(S.fbCfg||"")+"</textarea>";
  h+='<button class="fb-btn" onclick="sfb()">Connect Firebase</button></div>';
  h+='<div class="st-cd"><div class="st-lbl" style="font-size:12px">Devices</div><div class="st-desc" style="font-size:10px">With Firebase, all sync in real-time.</div>';
  h+='<div class="dtags"><span class="dtag">OnePlus Pad 3</span><span class="dtag">Nord CE 5</span><span class="dtag">Pixel 7</span><span class="dtag">iPad 9th Gen</span></div></div>';
  h+='<div class="st-cd"><div class="st-lbl" style="font-size:12px">Reset Progress</div><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">';
  h+='<button class="dbtn" onclick="rp(\''+S.p+"')\">"+(isR?"Rutik":"Vaishnavi")+'</button><button class="dbtn" onclick="rp(\'both\')">Both</button></div></div>';
  h+='<div class="st-cd"><div class="st-lbl" style="font-size:12px">Home Screen</div><div class="st-desc" style="font-size:10px"><b style="color:var(--t2)">Android:</b> Chrome \u2192 \u22EE \u2192 Add to Home<br><b style="color:var(--t2)">iPad:</b> Safari \u2192 Share \u2192 Add to Home</div></div>';
  h+='<div style="text-align:center;padding:16px;color:var(--t4);font-size:9px;line-height:1.8">StudySync v5.0<br>Rutik & Vaishnavi \uD83D\uDC9C<br>NEET PG 2026</div></div>';

  // ── BOTTOM NAV (5 tabs) ────────────────────────────────────────────────────
  h+='<div class="bot-nav">';
  [["schedule","\uD83D\uDCCB","Today"],["stats","\uD83D\uDCCA","Stats"],["board","\uD83C\uDFC6","Board"],["love","\uD83D\uDC8C","Love"],["calendar","\uD83D\uDCC5","Cal"]].forEach(function(tb){
    h+='<button class="nav-b '+(S.v===tb[0]?"on":"")+'" onclick="sv(\''+tb[0]+'\')"><span class="nav-i">'+tb[1]+'</span><span>'+tb[2]+'</span></button>';
  });
  h+='</div>';

  h+='<div class="bspace"></div>';
  document.getElementById("app").innerHTML=h;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
window.sp=function(p){S.p=p;save();render()};
window.sv=function(v){S.v=v;render()};
window.tg=function(id){
  if(!S.data[S.p])S.data[S.p]={};
  if(!S.data[S.p][id])S.data[S.p][id]={};
  var wasDone=S.data[S.p][id].done;
  S.data[S.p][id].done=!wasDone;
  if(!wasDone){
    // Find the task to get its category for XP toast
    var sc=sched();var cat="routine";
    for(var i=0;i<sc.length;i++){if(sc[i].id===id){cat=sc[i].cat;break}}
    var xp=XP_MAP[cat]||3;
    showXP(xp,cat);
  }
  saveHistory();save();render();
};
window.sa=function(id,val){if(!S.data[S.p])S.data[S.p]={};if(!S.data[S.p][id])S.data[S.p][id]={};S.data[S.p][id].actualMin=parseInt(val)||0;save()};
window.te=function(id){expanded[id]=!expanded[id];render()};
window.tta=function(){S.ta=!S.ta;save();render()};
window.tse=function(){S.showEditor=!S.showEditor;save();render()};
window.scal=function(){var inp=document.getElementById("calinp");if(inp)S.cal=inp.value.trim();save();render()};
window.sfb=function(){var inp=document.getElementById("fbinp");if(inp){S.fbCfg=inp.value.trim();save();if(typeof firebase==="undefined"){alert("Firebase SDK loading. Wait a few seconds and tap again.")}else{fbInit()}}};
window.rp=function(w){if(confirm("Reset "+(w==="both"?"both":w)+"?")){if(w==="both")S.data={rutik:{},vaishnavi:{}};else S.data[w]={};save();render()}};
window.ofoc=function(id){S.foc=id;render()};
window.cfoc=function(){S.foc=null;render()};
window.openEdit=function(id){S.editModal=id;render()};
window.closeEdit=function(){S.editModal=null;render()};
window.saveEdit=function(id){
  var nm2=document.getElementById("ed-name").value.trim();
  var tm=document.getElementById("ed-time").value.trim();
  var dr=parseInt(document.getElementById("ed-dur").value);
  var ds=document.getElementById("ed-desc").value.trim();
  if(!S.edits[S.p])S.edits[S.p]={};
  S.edits[S.p][id]={block:nm2,time:tm,dur:isNaN(dr)?0:dr,desc:ds};
  S.editModal=null;save();render();
};
window.resetEdit=function(id){
  if(S.edits[S.p]&&S.edits[S.p][id]){delete S.edits[S.p][id]}
  S.editModal=null;save();render();
};
window.saveNote=function(val){S.notes[TODAY+"_"+S.p]=val;save()};
window.sendLove=function(){
  var inp=document.getElementById("loveinp");if(!inp||!inp.value.trim())return;
  if(!S.loveNotes)S.loveNotes=[];
  var now=new Date();var timeStr=now.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  S.loveNotes.push({from:S.p,text:inp.value.trim(),time:timeStr,ts:Date.now()});
  if(S.loveNotes.length>50)S.loveNotes=S.loveNotes.slice(-50);
  save();render();
};
window.setEnergy=function(val){S.tracker.energy[TODAY+"_"+S.p]=val;save();render()};
window.setBrain=function(state){var k=TODAY+"_"+S.p;if(!S.tracker.brain[k])S.tracker.brain[k]={};S.tracker.brain[k].state=state;save();render()};
window.setBrainTopic=function(val){var k=TODAY+"_"+S.p;if(!S.tracker.brain[k])S.tracker.brain[k]={};S.tracker.brain[k].topic=val;save()};
window.setWins=function(val){S.tracker.energy[TODAY+"_"+S.p+"_wins"]=val;save()};
window.logGT=function(){
  var d2=document.getElementById("gt-date").value;var a=parseInt(document.getElementById("gt-actual").value);var p=parseInt(document.getElementById("gt-pred").value);
  if(!d2||isNaN(a)||isNaN(p)){alert("Fill all GT fields");return}
  if(!S.tracker.gt)S.tracker.gt=[];
  S.tracker.gt.push({date:d2,who:S.p,actual:a,predicted:p});save();render();
};
window.toggleSettings=function(){S.settingsOpen=!S.settingsOpen;render()};

// ── CLOCK ────────────────────────────────────────────────────────────────────
function tick(){
  var el=document.getElementById("clk");
  if(el){var c=gc();el.innerHTML=c.h+":"+c.m+'<span class="clock-sec">:'+c.s+'</span> <span class="clock-per">'+c.p+"</span>"}
  var cd=document.getElementById("cd");
  if(cd){var sc2=sched();var d2=pd();var at2=S.ta?adjT(sc2,d2):null;var act2=actTask(sc2,at2);if(act2){var ar3=actRem(act2,at2);cd.textContent=ar3.rem>0?fm(ar3.rem):"Done"}}
  var ft2=document.getElementById("ftimer");
  if(ft2&&S.foc){var sc3=sched();var d3=pd();var at3=S.ta?adjT(sc3,d3):null;var ft3=null;for(var i=0;i<sc3.length;i++){if(sc3[i].id===S.foc)ft3=sc3[i]}if(ft3){var ar4=actRem(ft3,at3);ft2.textContent=ar4.rem>0?fm(ar4.rem):"Done!"}}
}
setInterval(tick,1000);
setInterval(function(){if(!S.foc&&!S.editModal)render()},60000);

(function(){var s1=document.createElement("script");s1.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js";s1.onload=function(){var s2=document.createElement("script");s2.src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js";s2.onload=function(){fbInit()};document.head.appendChild(s2)};document.head.appendChild(s1)})();
render();
</script>
